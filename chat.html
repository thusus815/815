<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>815 아카이브 — 역사 대화</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --danger: #f85149;
    --user-bubble: #1f3a5c;
    --ai-bubble: #1c2128;
    --persona-tag: #388bfd22;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    font-size: 15px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  header a {
    margin-left: auto;
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
  }
  header a:hover { color: var(--text); }

  /* ── Persona Bar ── */
  #persona-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    flex-shrink: 0;
  }
  #persona-bar label {
    font-size: 12px;
    color: var(--muted);
    margin-right: 4px;
  }
  .persona-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .persona-btn:hover { border-color: var(--accent); color: var(--text); }
  .persona-btn.active {
    background: var(--persona-tag);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }

  /* ── Persona Info Strip ── */
  #persona-info {
    display: none;
    padding: 8px 20px;
    background: #161b22;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
  }
  #persona-info.visible { display: flex; gap: 16px; align-items: center; }
  #persona-info .badge {
    background: #21262d;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 11px;
  }
  #persona-info .disclaimer {
    font-size: 11px;
    color: #e3b341;
    margin-left: auto;
  }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .msg {
    display: flex;
    gap: 10px;
    max-width: 820px;
    width: 100%;
  }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai   { align-self: flex-start; }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg.user .avatar { background: var(--accent); }
  .msg.ai   .avatar { background: var(--surface2); border: 1px solid var(--border); }

  .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
    max-width: 700px;
  }
  .msg.user .bubble {
    background: var(--user-bubble);
    border-color: #1f3a5c;
  }

  .persona-label {
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 4px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .sources {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .source-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 11px;
    color: var(--muted);
  }

  .typing {
    display: flex;
    gap: 4px;
    padding: 14px 16px;
  }
  .typing span {
    width: 7px;
    height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  /* ── Welcome Card ── */
  #welcome {
    margin: auto;
    text-align: center;
    max-width: 540px;
    padding: 20px;
  }
  #welcome h2 { font-size: 22px; margin-bottom: 10px; }
  #welcome p  { color: var(--muted); font-size: 14px; line-height: 1.7; }
  .example-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 18px;
  }
  .pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text);
    transition: border-color 0.15s;
  }
  .pill:hover { border-color: var(--accent); }

  /* ── Input Area ── */
  #input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  #question {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    padding: 10px 14px;
    resize: none;
    font-family: inherit;
    line-height: 1.5;
    max-height: 120px;
    overflow-y: auto;
    transition: border-color 0.15s;
  }
  #question:focus { outline: none; border-color: var(--accent); }
  #question::placeholder { color: var(--muted); }
  #send-btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 15px;
    padding: 10px 18px;
    cursor: pointer;
    font-weight: 600;
    transition: opacity 0.15s;
    align-self: flex-end;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <div class="logo"><span>815</span> 아카이브</div>
  <span style="color:var(--muted);font-size:13px">역사 대화 · 충북 항일운동</span>
  <a href="graph.html">그래프 보기 →</a>
</header>

<div id="persona-bar">
  <label>대화 상대</label>
  <button class="persona-btn active" data-id="">🗂 아카이브 검색</button>
  <button class="persona-btn" data-id="park_sungil_1930">📖 박순길 (청주농고 3학년, 1930)</button>
  <button class="persona-btn" data-id="curator_local">🔍 안내 큐레이터</button>
</div>

<div id="persona-info">
  <span id="pi-era" class="badge"></span>
  <span id="pi-region" class="badge"></span>
  <span class="disclaimer">※ 가상 인물입니다. 실제 증언이 아닙니다.</span>
</div>

<div id="messages">
  <div id="welcome">
    <h2>역사와 대화하세요</h2>
    <p>충청북도 항일운동 사건·인물·조직에 대해 질문하거나,<br>
       1930년 청주농고 학생 <strong>박순길</strong>의 시점으로 이야기를 들어보세요.</p>
    <div class="example-pills">
      <div class="pill" data-q="1930년 1월 21일 맹휴가 어떻게 시작됐나요?">맹휴 당일 이야기</div>
      <div class="pill" data-q="광주학생운동 소식을 처음 들었을 때 어떠셨나요?">광주 소식을 들었을 때</div>
      <div class="pill" data-q="청주농고 1930년 맹휴에서 누가 구속됐나요?">구속자·퇴학자는?</div>
      <div class="pill" data-q="충북 학생 독립운동 전체 타임라인을 알려줘">충북 학생운동 전체 흐름</div>
      <div class="pill" data-q="친일 관리가 회유한다면 어떻게 대응하셨나요?">친일 관리와의 대화</div>
      <div class="pill" data-q="서상경은 어떤 인물인가요?">서상경 인물 해설</div>
    </div>
  </div>
</div>

<div id="input-area">
  <textarea id="question" rows="1" placeholder="질문을 입력하세요 (Shift+Enter 줄바꿈, Enter 전송)"></textarea>
  <button id="send-btn">전송</button>
</div>

<script>
const WORKER_URL = "https://815-chat.sungandpartners.workers.dev";

// URL 파라미터 또는 sessionStorage에서 초기 페르소나 결정
const _urlParams = new URLSearchParams(location.search);
let currentPersonaId = _urlParams.get('persona') || sessionStorage.getItem('autoPersona') || "";
sessionStorage.removeItem('autoPersona');
let currentPersonaDef = null;

// ── Persona buttons ────────────────────────────────────────────────
const personaBtns = document.querySelectorAll(".persona-btn");
const personaInfo = document.getElementById("persona-info");
const piEra      = document.getElementById("pi-era");
const piRegion   = document.getElementById("pi-region");

function activatePersona(id) {
  personaBtns.forEach(b => b.classList.remove("active"));
  const target = document.querySelector(`.persona-btn[data-id="${id}"]`);
  if (target) target.classList.add("active");
  else document.querySelector('.persona-btn[data-id=""]').classList.add("active");
  currentPersonaId = id;

  if (id) {
    fetch(`${WORKER_URL}/personas`)
      .then(r => r.json())
      .then(list => {
        const p = list.find(x => x.id === id);
        if (p) {
          piEra.textContent    = `시기: ${p.era}`;
          piRegion.textContent = `지역: ${p.region}`;
          personaInfo.classList.add("visible");
          personaInfo.querySelector(".disclaimer").style.display =
            p.id === "curator_local" ? "none" : "inline";
        }
      })
      .catch(() => { personaInfo.classList.add("visible"); });
  } else {
    personaInfo.classList.remove("visible");
  }
}

// 초기 페르소나 적용
if (currentPersonaId) activatePersona(currentPersonaId);

personaBtns.forEach(btn => {
  btn.addEventListener("click", () => activatePersona(btn.dataset.id || ""));
});

// ── Example pills ──────────────────────────────────────────────────
document.querySelectorAll(".pill").forEach(p => {
  p.addEventListener("click", () => {
    document.getElementById("question").value = p.dataset.q;
    sendMessage();
  });
});

// ── Textarea auto-height & Enter to send ──────────────────────────
const textarea = document.getElementById("question");
textarea.addEventListener("input", () => {
  textarea.style.height = "auto";
  textarea.style.height = Math.min(textarea.scrollHeight, 120) + "px";
});
textarea.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById("send-btn").addEventListener("click", sendMessage);

// ── Message rendering ──────────────────────────────────────────────
const messagesEl = document.getElementById("messages");

function removeWelcome() {
  const w = document.getElementById("welcome");
  if (w) w.remove();
}

function addUserBubble(text) {
  removeWelcome();
  const div = document.createElement("div");
  div.className = "msg user";
  div.innerHTML = `
    <div class="avatar">🧑</div>
    <div class="bubble">${escHtml(text)}</div>`;
  messagesEl.appendChild(div);
  scrollBottom();
}

function addTyping() {
  const div = document.createElement("div");
  div.className = "msg ai";
  div.id = "typing-indicator";
  div.innerHTML = `
    <div class="avatar">📜</div>
    <div class="bubble">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>`;
  messagesEl.appendChild(div);
  scrollBottom();
}

function removeTyping() {
  const t = document.getElementById("typing-indicator");
  if (t) t.remove();
}

function addAiBubble(answer, persona, sources) {
  const div = document.createElement("div");
  div.className = "msg ai";

  const personaHtml = persona
    ? `<div class="persona-label">📖 ${escHtml(persona.displayName)}</div>`
    : "";

  const sourcesHtml = sources && sources.length
    ? `<div class="sources">${sources.map(s =>
        `<span class="source-chip">${escHtml(s.label)}</span>`).join("")}</div>`
    : "";

  div.innerHTML = `
    <div class="avatar">${persona && persona.id === "park_sungil_1930" ? "📖" : persona ? "🔍" : "🗂"}</div>
    <div class="bubble">
      ${personaHtml}
      ${escHtml(answer)}
      ${sourcesHtml}
    </div>`;
  messagesEl.appendChild(div);
  scrollBottom();
}

function addErrorBubble(msg) {
  const div = document.createElement("div");
  div.className = "msg ai";
  div.innerHTML = `
    <div class="avatar">⚠️</div>
    <div class="bubble" style="color:var(--danger)">${escHtml(msg)}</div>`;
  messagesEl.appendChild(div);
  scrollBottom();
}

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/\n/g, "<br>");
}

// ── Send ───────────────────────────────────────────────────────────
async function sendMessage() {
  const q = textarea.value.trim();
  if (!q) return;

  textarea.value = "";
  textarea.style.height = "auto";
  document.getElementById("send-btn").disabled = true;

  addUserBubble(q);
  addTyping();

  try {
    let res, data;

    if (currentPersonaId) {
      res = await fetch(`${WORKER_URL}/persona`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ persona_id: currentPersonaId, question: q }),
      });
    } else {
      res = await fetch(`${WORKER_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: q }),
      });
    }

    data = await res.json();

    removeTyping();

    if (!res.ok || data.error) {
      addErrorBubble(data.error || `오류 ${res.status}`);
    } else {
      addAiBubble(data.answer, data.persona, data.sources);
    }
  } catch (e) {
    removeTyping();
    addErrorBubble("서버 연결 실패. Worker가 배포되어 있는지 확인하세요.\n" + e.message);
  }

  document.getElementById("send-btn").disabled = false;
  textarea.focus();
}
</script>
</body>
</html>
