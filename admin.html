<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>관리자 — 나의 3·1</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card: #20232f;
    --border: #2e3142;
    --gold: #c9a84c;
    --gold-dim: #8a6f30;
    --text: #e8e6e0;
    --muted: #7a7a8a;
    --green: #3dba7a;
    --red: #e05c5c;
    --blue: #5b8dee;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Serif KR', Georgia, serif; min-height: 100vh; }

  /* 로그인 */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  .login-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 48px 40px; width: 100%; max-width: 400px;
    text-align: center;
  }
  .login-box h1 { font-size: 22px; margin-bottom: 8px; color: var(--gold); }
  .login-box p { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .login-box input {
    width: 100%; padding: 12px 16px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text); font-size: 15px; margin-bottom: 16px;
  }
  .login-box button {
    width: 100%; padding: 13px; background: var(--gold); color: #1a1200;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: opacity .2s;
  }
  .login-box button:hover { opacity: .85; }
  .login-err { color: var(--red); font-size: 13px; margin-top: 12px; }

  /* 메인 레이아웃 */
  #app { display: none; }
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 32px; display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 18px; color: var(--gold); flex: 1; }
  header .logout { color: var(--muted); font-size: 13px; cursor: pointer; }
  header .logout:hover { color: var(--text); }

  .tabs {
    padding: 16px 32px 0; border-bottom: 1px solid var(--border);
    display: flex; gap: 0;
  }
  .tab-btn {
    padding: 10px 24px; background: none; border: none; color: var(--muted);
    font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent;
    transition: all .2s;
  }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  .main { padding: 28px 32px; max-width: 1100px; margin: 0 auto; }

  /* 이슈 목록 */
  .filter-row { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
  .filter-row select, .filter-row input {
    padding: 8px 12px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: 14px;
  }
  .refresh-btn {
    padding: 8px 18px; background: var(--card); border: 1px solid var(--border);
    color: var(--text); border-radius: 7px; cursor: pointer; font-size: 14px;
  }
  .refresh-btn:hover { border-color: var(--gold); }

  .issue-list { display: flex; flex-direction: column; gap: 10px; }
  .issue-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px 20px; cursor: pointer; transition: border-color .2s;
    display: flex; gap: 16px; align-items: flex-start;
  }
  .issue-card:hover { border-color: var(--gold-dim); }
  .issue-num { color: var(--muted); font-size: 13px; min-width: 36px; padding-top: 2px; }
  .issue-body { flex: 1; }
  .issue-title { font-size: 15px; margin-bottom: 6px; }
  .issue-meta { font-size: 12px; color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
  }
  .badge-open { background: #1a3a1a; color: var(--green); }
  .badge-closed { background: #2a1a1a; color: var(--muted); }
  .badge-review-ok      { background: #1a3a2a; color: #5dba9a; }
  .badge-review-edit    { background: #3a2e1a; color: #e0b85c; }
  .badge-review-reroute { background: #1a2a3a; color: var(--blue); }
  .badge-review-reject  { background: #3a1a1a; color: var(--red); }
  .badge-review-none    { background: #2a2a3a; color: var(--muted); }

  /* 검토 진행 요약 */
  .summary-bar {
    display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 18px; margin-bottom: 14px;
    font-size: 13px;
  }
  .summary-item { color: var(--muted); cursor: pointer; padding: 2px 6px; border-radius: 5px; transition: background .15s; }
  .summary-item:hover { background: var(--card); }
  .summary-item.active { background: var(--card); color: var(--text); }
  .summary-item strong { color: var(--text); margin-left: 4px; }
  .summary-divider { color: var(--border); }

  .empty-msg { color: var(--muted); text-align: center; padding: 60px 0; font-size: 15px; }
  .loading-msg { color: var(--muted); text-align: center; padding: 40px 0; }

  /* 상세 모달 */
  .modal-backdrop {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75);
    z-index: 100; overflow-y: auto; padding: 32px 16px;
  }
  .modal-backdrop.open { display: flex; align-items: flex-start; justify-content: center; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); width: 100%; max-width: 760px;
    padding: 32px; position: relative;
  }
  .modal-close {
    position: absolute; top: 16px; right: 20px; background: none; border: none;
    color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1;
  }
  .modal-close:hover { color: var(--text); }
  .modal h2 { font-size: 18px; margin-bottom: 20px; padding-right: 32px; }

  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .field-item { background: var(--card); border-radius: 8px; padding: 12px 14px; }
  .field-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .field-value { font-size: 14px; word-break: break-all; }
  .field-full { grid-column: 1 / -1; }

  /* 이미지 미리보기 */
  .attachments-section { margin-bottom: 20px; }
  .attachments-section h3 { font-size: 14px; color: var(--gold); margin-bottom: 12px; }
  .attachment-grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .attachment-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .attachment-item img {
    max-width: 200px; max-height: 160px; border-radius: 6px;
    border: 1px solid var(--border); cursor: pointer; object-fit: cover;
  }
  .attachment-item img:hover { border-color: var(--gold); }
  .attachment-item a {
    font-size: 12px; color: var(--blue); text-decoration: none; max-width: 200px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center;
  }
  .attachment-item a:hover { text-decoration: underline; }

  /* OCR / 분석 영역 */
  .analysis-section {
    border-top: 1px solid var(--border); padding-top: 20px; margin-top: 4px; margin-bottom: 4px;
  }
  .analysis-section h3 { font-size: 14px; color: var(--gold); margin-bottom: 14px; }
  .ocr-select-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .ocr-select-row select {
    flex: 1; padding: 8px 12px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: 13px;
  }
  .btn-ocr {
    padding: 9px 20px; background: var(--blue); color: #fff;
    border: none; border-radius: 8px; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: opacity .2s; white-space: nowrap;
  }
  .btn-ocr:hover { opacity: .85; }
  .btn-ocr:disabled { opacity: .4; cursor: not-allowed; }
  .btn-analyze {
    padding: 9px 20px; background: #6c4fa8; color: #fff;
    border: none; border-radius: 8px; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: opacity .2s; white-space: nowrap;
  }
  .btn-analyze:hover { opacity: .85; }
  .btn-analyze:disabled { opacity: .4; cursor: not-allowed; }
  .ocr-result {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; font-size: 13px; font-family: monospace; white-space: pre-wrap;
    max-height: 260px; overflow-y: auto; margin-bottom: 10px; display: none;
  }
  .analysis-result {
    background: #1a1a2e; border: 1px solid #3a2a6e; border-radius: 8px;
    padding: 14px; font-size: 13px; line-height: 1.7; white-space: pre-wrap;
    max-height: 320px; overflow-y: auto; display: none;
  }
  .analysis-loading { color: var(--muted); font-size: 13px; margin: 8px 0; display: none; }

  /* 승인/거부 영역 */
  .action-section { border-top: 1px solid var(--border); padding-top: 20px; margin-top: 4px; }
  .action-section h3 { font-size: 14px; color: var(--gold); margin-bottom: 14px; }
  .path-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .path-row input {
    flex: 1; padding: 9px 12px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: 13px; font-family: monospace;
  }
  .path-row label { font-size: 12px; color: var(--muted); margin-bottom: 4px; display: block; }
  .path-group { flex: 1; }
  .md-preview-toggle {
    font-size: 12px; color: var(--blue); cursor: pointer; margin-bottom: 10px; display: inline-block;
  }
  .md-editor {
    width: 100%; height: 220px; padding: 10px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text); font-size: 12px; font-family: monospace;
    resize: vertical; display: none; margin-bottom: 10px;
  }
  .reject-reason {
    width: 100%; padding: 9px 12px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: 13px;
    margin-bottom: 12px; display: none;
  }
  .action-btns { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-approve {
    padding: 11px 28px; background: var(--green); color: #0a1a10;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: opacity .2s;
  }
  .btn-approve:hover { opacity: .85; }
  .btn-approve:disabled { opacity: .4; cursor: not-allowed; }
  .btn-reject {
    padding: 11px 28px; background: var(--red); color: #fff;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: opacity .2s;
  }
  .btn-reject:hover { opacity: .85; }
  .btn-reject:disabled { opacity: .4; cursor: not-allowed; }
  .btn-outline {
    padding: 11px 20px; background: none; border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; font-size: 13px; cursor: pointer;
  }
  .btn-outline:hover { border-color: var(--gold); }
  .action-result { margin-top: 12px; font-size: 13px; }
  .action-result.ok { color: var(--green); }
  .action-result.err { color: var(--red); }

  /* 이미지 전체화면 */
  .img-fullscreen {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.9);
    z-index: 200; align-items: center; justify-content: center; cursor: zoom-out;
  }
  .img-fullscreen.open { display: flex; }
  .img-fullscreen img { max-width: 94vw; max-height: 94vh; border-radius: 6px; }

  @media (max-width: 600px) {
    .field-grid { grid-template-columns: 1fr; }
    .main { padding: 16px; }
    header { padding: 12px 16px; }
    .tabs { padding: 12px 16px 0; }
  }
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-box">
    <h1>나의 3·1</h1>
    <p>관리자 전용 페이지입니다</p>
    <input type="password" id="secret-input" placeholder="관리자 비밀번호" autocomplete="current-password">
    <button onclick="doLogin()">로그인</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app">
  <header>
    <h1>나의 3·1 — 관리자</h1>
    <span class="logout" onclick="doLogout()">로그아웃</span>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('issues')">제출 자료</button>
    <button class="tab-btn" onclick="switchTab('closed')">처리 완료</button>
  </div>

  <div class="main">
    <div class="filter-row">
      <input type="text" id="search-input" placeholder="제목·지역 검색..." oninput="renderIssues()" style="flex:1">
      <button class="refresh-btn" onclick="bulkApproveFiltered()" id="btn-bulk-approve" title="검색·라벨 필터 결과를 자동 경로로 일괄 승인">⚡ 필터 일괄 승인</button>
      <button class="refresh-btn" onclick="diagnoseToken()" title="등록된 GITHUB_TOKEN의 owner/권한 진단" style="background:#3a3a5a">🔍 토큰 진단</button>
      <button class="refresh-btn" onclick="loadIssues()">↻ 새로고침</button>
    </div>
    <div id="bulk-progress" style="display:none;margin-bottom:12px;padding:10px 14px;background:#1d2333;border:1px solid var(--border);border-radius:8px;font-size:13px"></div>
    <div id="issue-list-area">
      <div class="loading-msg">불러오는 중...</div>
    </div>
  </div>
</div>

<!-- 상세 모달 -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <h2 id="modal-title"></h2>

    <div class="field-grid" id="modal-fields"></div>

    <div class="attachments-section" id="modal-attachments"></div>

    <div class="analysis-section">
      <h3>📄 텍스트 추출 · 사료 분석</h3>
      <div class="ocr-select-row">
        <select id="ocr-file-select">
          <option value="">— 분석할 이미지 선택 —</option>
        </select>
        <button class="btn-ocr" id="btn-ocr" onclick="doOcr()">🔍 Gemini 분석</button>
      </div>
      <div class="analysis-loading" id="ocr-loading">⏳ Gemini 분석 중 (15~30초)...</div>
      <div class="analysis-loading" id="analyze-loading" style="display:none"></div>
      <div style="margin-bottom:6px;font-size:12px;color:var(--muted)" id="ocr-result-label" style="display:none">📝 추출 텍스트</div>
      <div class="ocr-result" id="ocr-result"></div>
      <div style="margin-bottom:6px;font-size:12px;color:#9b7fe8;margin-top:10px" id="analysis-label" style="display:none">🤖 사료 분석 결과</div>
      <div class="analysis-result" id="analysis-result"></div>
    </div>

    <div class="action-section">
      <div id="suggestion-box" style="display:none;margin-bottom:16px;padding:14px;border-radius:8px;background:#3a3a1f;border:1px solid #a89c54"></div>
      <h3>관리자 처리</h3>
      <div class="path-row">
        <div class="path-group">
          <label>저장 폴더 경로</label>
          <input type="text" id="field-folder" placeholder="04-지역/충남/예산">
        </div>
        <div class="path-group">
          <label>파일명 (.md)</label>
          <input type="text" id="field-filename" placeholder="자료제목.md">
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
        <span class="md-preview-toggle" onclick="toggleMdEditor()" style="flex:1">▶ md 내용 직접 편집</span>
        <button class="btn-outline" onclick="normalizeKoreanInMd()" id="btn-normalize-spacing"
                title="한글 변환 본문에 띄어쓰기를 자동으로 적용합니다 (Llama 3.3 70B)"
                style="font-size:12px;padding:6px 12px;background:#3a2e6e;border-color:#5a4cb8;color:#d8c8ff">
          🪄 한글 띄어쓰기 정리
        </button>
      </div>
      <textarea class="md-editor" id="md-editor"></textarea>

      <div class="action-btns">
        <button class="btn-approve" id="btn-approve" onclick="doApprove()">✅ 승인 · 아카이브 반영</button>
        <button class="btn-outline" onclick="toggleRejectBox()">⚠️ 반려</button>
        <button class="btn-approve" id="btn-update" onclick="doUpdate('edit')" style="display:none;background:#3a6a8a">✏️ 수정 반영</button>
        <button class="btn-outline" id="btn-supplement" onclick="doUpdate('supplement')" style="display:none;background:#2a5a3a;border-color:#5aa080;color:#b0ffd0">➕ 보충 반영</button>
        <button class="btn-outline" id="btn-regen" onclick="doRegenerate()" style="display:none;background:#3a3a6a;border-color:#6a6aaa;color:#c8c8ff" title="현재 worker buildMdFromIssue 로직으로 .md를 새로 생성하여 덮어쓰기">🔁 자동 분류 재생성</button>
        <button class="btn-outline" id="btn-recall" onclick="doRecall()" style="display:none;background:#5a2a2a;border-color:#a05050;color:#ffb0b0">🔄 회수 (사후 반려)</button>
      </div>

      <textarea class="reject-reason" id="reject-reason" rows="3" placeholder="반려 사유를 입력해주세요..."></textarea>
      <div id="reject-confirm" style="display:none; margin-top:8px;">
        <button class="btn-reject" id="btn-reject" onclick="doReject()">반려 처리 확정</button>
      </div>

      <div class="action-result" id="action-result"></div>
    </div>
  </div>
</div>

<!-- 이미지 전체화면 -->
<div class="img-fullscreen" id="img-fullscreen" onclick="closeFullscreen()">
  <img id="fullscreen-img" src="" alt="">
</div>

<!-- AI 재생성 prev/next 비교 모달 -->
<div class="modal-backdrop" id="diff-modal" onclick="if(event.target===this)closeDiffModal()">
  <div style="background:#1a1a1f;border:1px solid #444;border-radius:8px;width:96vw;max-width:1600px;max-height:92vh;display:flex;flex-direction:column;margin:1.5vh auto;box-shadow:0 8px 32px rgba(0,0,0,0.6)">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid #333">
      <h3 id="diff-title" style="margin:0;color:#e0e0e0;font-size:14px">AI 재생성 비교</h3>
      <button onclick="closeDiffModal()" style="background:transparent;border:none;color:#aaa;font-size:22px;cursor:pointer">×</button>
    </div>
    <div style="padding:8px 20px;border-bottom:1px solid #333;color:#aaa;font-size:12px;display:flex;gap:18px;align-items:center;flex-wrap:wrap">
      <span id="diff-stats"></span>
      <span style="color:#666">|</span>
      <span><span style="display:inline-block;width:12px;height:12px;background:#1f3a1f;vertical-align:middle;margin-right:4px"></span>추가</span>
      <span><span style="display:inline-block;width:12px;height:12px;background:#3a1f1f;vertical-align:middle;margin-right:4px"></span>삭제</span>
      <span><span style="display:inline-block;width:12px;height:12px;background:#222;vertical-align:middle;margin-right:4px"></span>동일</span>
      <span style="margin-left:auto;color:#888">왼쪽 = 이전 / 오른쪽 = 새 결과</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#333;flex:1;overflow:hidden;min-height:0">
      <div style="background:#15151a;overflow:auto;min-height:0">
        <div style="padding:8px 12px;border-bottom:1px solid #333;color:#aaa;font-size:12px;font-weight:bold;background:#1a1a1f;position:sticky;top:0;z-index:1">이전 (prev)</div>
        <div id="diff-prev" class="diff-pane"></div>
      </div>
      <div style="background:#15151a;overflow:auto;min-height:0">
        <div style="padding:8px 12px;border-bottom:1px solid #333;color:#aaa;font-size:12px;font-weight:bold;background:#1a1a1f;position:sticky;top:0;z-index:1">새 결과 (next)</div>
        <div id="diff-next" class="diff-pane"></div>
      </div>
    </div>
    <div style="padding:12px 20px;border-top:1px solid #333;display:flex;justify-content:flex-end;gap:8px">
      <button onclick="closeDiffModal()" style="padding:8px 16px;background:#333;border:1px solid #555;color:#ccc;border-radius:4px;cursor:pointer">취소 (적용 안 함)</button>
      <button id="diff-confirm" onclick="diffApply()" style="padding:8px 16px;background:#2a5a3a;border:1px solid #5aa080;color:#b0ffd0;border-radius:4px;cursor:pointer;font-weight:bold">✅ 적용</button>
    </div>
  </div>
</div>

<style>
.diff-pane { font-family: 'Menlo','Consolas',monospace; font-size: 12px; line-height: 1.55; }
.diff-pane .dl { display:flex; min-height:1.55em; white-space:pre; }

</style>

<script>
const WORKER_URL = 'https://815-chat.sungandpartners.workers.dev';
let adminSecret = '';
let allIssues = [];
let currentIssue = null;
let currentTab = 'open';
let mdEditorOpen = false;
let rejectBoxOpen = false;
let reviewFilter = 'all'; // all | ok | edit | reroute | reject | none

const REVIEW_LABEL_MAP = {
  '검토완료':   { key: 'ok',      text: '✅ 검토완료',   cls: 'badge-review-ok' },
  '수정필요':   { key: 'edit',    text: '✏️ 수정필요',   cls: 'badge-review-edit' },
  '분류재검토': { key: 'reroute', text: '🗂 분류재검토', cls: 'badge-review-reroute' },
  '반려추천':   { key: 'reject',  text: '❌ 반려추천',   cls: 'badge-review-reject' },
};
const REVIEW_NONE = { key: 'none', text: '🆕 미검토', cls: 'badge-review-none' };

// KV review state(authoritative) → GitHub 라벨(2차) → 미검토 순으로 판정.
// 검토자가 review.html에서 라벨을 부여한 시점에 token이 무효였으면 GitHub
// 라벨 동기화가 실패할 수 있음. 그래도 KV에는 정상 저장되므로 그것을 우선.
const REVIEW_STATE_MAP = {
  'ok': REVIEW_LABEL_MAP['검토완료'],
  'edit_needed': REVIEW_LABEL_MAP['수정필요'],
  'reroute_suggested': REVIEW_LABEL_MAP['분류재검토'],
  'reject_suggested': REVIEW_LABEL_MAP['반려추천'],
};
function reviewLabelOf(issue) {
  const rs = issue.review_state;
  if (rs && REVIEW_STATE_MAP[rs]) return REVIEW_STATE_MAP[rs];
  const labelNames = (issue.labels || []).map(l => typeof l === 'string' ? l : l.name);
  for (const name of ['검토완료','수정필요','분류재검토','반려추천']) {
    if (labelNames.includes(name)) return REVIEW_LABEL_MAP[name];
  }
  return REVIEW_NONE;
}

// submit.html은 공개 폼이라 누구나 임의 텍스트로 이슈를 생성할 수 있다.
// title/body에서 추출한 모든 값은 innerHTML에 넣기 전 반드시 이스케이프.
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// 본문용: 이스케이프 후 \n만 <br>로 복원
function escapeHtmlMultiline(s) {
  return escapeHtml(s).replace(/\n/g, '<br>');
}

// 사용자 입력이 들어가는 URL은 javascript: 등 위험한 스킴을 차단
function safeUrl(u) {
  if (!u) return '';
  const s = String(u).trim();
  if (/^https?:\/\//i.test(s)) return s;
  return '';
}

// ─── 로그인 ───────────────────────────────────────────────
document.getElementById('secret-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

const PER_PAGE = 100; // worker도 동일 값 사용
const MAX_PAGES = 10;  // 1000건 상한

async function fetchAllIssues(state, secret) {
  const all = [];
  let lastPageFull = false;
  for (let page = 1; page <= MAX_PAGES; page++) {
    const res = await fetch(`${WORKER_URL}/admin/issues?state=${state}&page=${page}`, {
      headers: { 'X-Admin-Secret': secret }
    });
    if (!res.ok) {
      const err = new Error(`서버 오류: ${res.status}`);
      err.status = res.status;
      throw err;
    }
    const data = await res.json();
    if (!Array.isArray(data)) {
      throw new Error(`응답 오류: ${JSON.stringify(data)}`);
    }
    all.push(...data);
    lastPageFull = data.length === PER_PAGE;
    if (!lastPageFull) break;
  }
  // 마지막 페이지가 꽉 찬 채로 상한에 도달했다면 추가 자료가 있을 수 있다는 뜻
  if (lastPageFull) {
    console.warn(`admin.html: ${MAX_PAGES * PER_PAGE}건 상한 도달 — 추가 자료가 누락됐을 수 있습니다. MAX_PAGES를 늘리거나 검토 진행을 통해 처리 완료 탭으로 옮겨주세요.`);
    showStaleBanner(MAX_PAGES * PER_PAGE);
  } else {
    hideStaleBanner();
  }
  return all;
}

function showStaleBanner(limit) {
  let el = document.getElementById('pagination-warning');
  if (!el) {
    el = document.createElement('div');
    el.id = 'pagination-warning';
    el.style.cssText = 'background:#3a2e1a;color:#e0b85c;border:1px solid #5a4a2a;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px';
    const main = document.querySelector('.main');
    if (main) main.insertBefore(el, main.firstChild);
  }
  el.textContent = `⚠ ${limit}건 상한 도달 — 추가 자료가 누락됐을 수 있습니다.`;
}

function hideStaleBanner() {
  const el = document.getElementById('pagination-warning');
  if (el) el.remove();
}

async function doLogin() {
  const secret = document.getElementById('secret-input').value.trim();
  if (!secret) return;
  const errEl = document.getElementById('login-err');
  errEl.textContent = '확인 중...';

  try {
    const data = await fetchAllIssues('open', secret);
    adminSecret = secret;
    errEl.textContent = '';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    allIssues = data;
    renderIssues();
  } catch(e) {
    if (e.status === 401) errEl.textContent = '비밀번호가 맞지 않습니다.';
    else errEl.textContent = e.message || `네트워크 오류`;
  }
}

function doLogout() {
  adminSecret = '';
  allIssues = [];
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('secret-input').value = '';
  document.getElementById('login-err').textContent = '';
}

// ─── 탭 ──────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab === 'issues' ? 'open' : 'closed';
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (tab === 'issues' && i === 0) || (tab === 'closed' && i === 1));
  });
  loadIssues();
}

async function loadIssues() {
  document.getElementById('issue-list-area').innerHTML = '<div class="loading-msg">불러오는 중...</div>';
  try {
    allIssues = await fetchAllIssues(currentTab, adminSecret);
  } catch(e) {
    allIssues = [];
    document.getElementById('issue-list-area').innerHTML = `<div class="empty-msg">불러오기 실패: ${escapeHtml(e.message)}</div>`;
    return;
  }
  renderIssues();
}

function setReviewFilter(key) {
  reviewFilter = key;
  renderIssues();
}

function renderIssues() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let filtered = q
    ? allIssues.filter(i => i.title.toLowerCase().includes(q) || (i.body || '').toLowerCase().includes(q))
    : allIssues;
  if (reviewFilter !== 'all') {
    filtered = filtered.filter(i => reviewLabelOf(i).key === reviewFilter);
  }
  renderIssueList(filtered);
}

function renderSummaryBar() {
  const counts = { ok: 0, edit: 0, reroute: 0, reject: 0, none: 0 };
  allIssues.forEach(i => counts[reviewLabelOf(i).key]++);
  const total = allIssues.length;
  const item = (key, label, n) =>
    `<span class="summary-item ${reviewFilter === key ? 'active' : ''}" onclick="setReviewFilter('${key}')">${label}<strong>${n}</strong></span>`;
  return `<div class="summary-bar">
    ${item('all', '전체 ', total)}
    <span class="summary-divider">|</span>
    ${item('none',    '🆕 미검토 ',     counts.none)}
    ${item('ok',      '✅ 검토완료 ',   counts.ok)}
    ${item('edit',    '✏️ 수정필요 ',   counts.edit)}
    ${item('reroute', '🗂 분류재검토 ', counts.reroute)}
    ${item('reject',  '❌ 반려추천 ',   counts.reject)}
  </div>`;
}

// 선택된 이슈 번호 (체크박스)
let SELECTED = new Set();

function renderIssueList(issues) {
  const el = document.getElementById('issue-list-area');
  const summary = renderSummaryBar();
  if (!issues.length) {
    el.innerHTML = summary + '<div class="empty-msg">조건에 맞는 자료가 없습니다.</div>';
    return;
  }
  // 표시된 이슈 중 SELECTED에 포함된 것만 유지 (필터 변경 시 정리)
  const visibleNums = new Set(issues.map(i => i.number));
  for (const n of [...SELECTED]) if (!visibleNums.has(n)) SELECTED.delete(n);

  const allChecked = issues.length > 0 && issues.every(i => SELECTED.has(i.number));
  const selBar = `
    <div style="display:flex;align-items:center;gap:12px;padding:8px 14px;background:#1d2333;border:1px solid var(--border);border-radius:8px;margin-bottom:10px">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
        <input type="checkbox" id="select-all" ${allChecked ? 'checked' : ''} onclick="toggleSelectAll(event)" style="cursor:pointer">
        전체 선택 (${issues.length}건)
      </label>
      <span style="color:var(--muted);font-size:13px">선택: <strong id="selected-count">${SELECTED.size}</strong>건</span>
      <button class="refresh-btn" onclick="bulkApproveSelected()" id="btn-bulk-selected"
              ${SELECTED.size === 0 ? 'disabled' : ''}
              style="background:#3a6a3a;border-color:#5aa05a;color:#cfe9cf">
        ⚡ 선택 일괄 승인 (${SELECTED.size})
      </button>
      <button class="refresh-btn" onclick="clearSelection()" ${SELECTED.size === 0 ? 'disabled' : ''}>해제</button>
    </div>`;

  el.innerHTML = summary + selBar + `<div class="issue-list">${issues.map(issue => {
    const region = extractSection(issue.body, '관련 지역') || '';
    const type   = extractSection(issue.body, '자료 종류') || '';
    const date   = extractSection(issue.body, '자료 연도') || '';
    const sub    = (issue.body || '').match(/^제출자: (.+)$/m)?.[1] || '익명';
    const title  = issue.title.replace('[자료 제출] ','');
    const stateBadge = issue.state === 'open'
      ? '<span class="badge badge-open">미처리</span>'
      : '<span class="badge badge-closed">완료</span>';
    const rev = reviewLabelOf(issue);
    const reviewBadge = `<span class="badge ${rev.cls}">${rev.text}</span>`;
    const isSel = SELECTED.has(issue.number);
    return `<div class="issue-card" data-num="${issue.number}">
      <input type="checkbox" class="issue-check" data-sel="${issue.number}" ${isSel ? 'checked' : ''}
             style="margin:18px 8px 0 4px;cursor:pointer;transform:scale(1.2)" onclick="event.stopPropagation()">
      <div class="issue-num" onclick="openModal(${issue.number})" style="cursor:pointer">#${issue.number}</div>
      <div class="issue-body" onclick="openModal(${issue.number})" style="cursor:pointer">
        <div class="issue-title">${escapeHtml(title)}</div>
        <div class="issue-meta">
          ${stateBadge}
          ${reviewBadge}
          ${region ? `<span>📍 ${escapeHtml(region)}</span>` : ''}
          ${type ? `<span>📄 ${escapeHtml(type)}</span>` : ''}
          ${date ? `<span>📅 ${escapeHtml(date)}</span>` : ''}
          <span>👤 ${escapeHtml(sub)}</span>
          <span>${timeAgo(issue.created_at)}</span>
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;

  // 체크박스 핸들러
  el.querySelectorAll('input.issue-check').forEach(cb => {
    cb.addEventListener('change', (e) => {
      const num = +e.target.dataset.sel;
      if (e.target.checked) SELECTED.add(num); else SELECTED.delete(num);
      updateSelectionBar();
    });
  });
}

function toggleSelectAll(e) {
  e.stopPropagation();
  const filtered = currentFilteredIssues();
  const all = filtered.every(i => SELECTED.has(i.number));
  if (all) {
    filtered.forEach(i => SELECTED.delete(i.number));
  } else {
    filtered.forEach(i => SELECTED.add(i.number));
  }
  renderIssues();
}

function clearSelection() {
  SELECTED.clear();
  renderIssues();
}

function updateSelectionBar() {
  document.getElementById('selected-count').textContent = SELECTED.size;
  const btn = document.getElementById('btn-bulk-selected');
  btn.textContent = `⚡ 선택 일괄 승인 (${SELECTED.size})`;
  btn.disabled = SELECTED.size === 0;
}

function currentFilteredIssues() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let filtered = q
    ? allIssues.filter(i => i.title.toLowerCase().includes(q) || (i.body || '').toLowerCase().includes(q))
    : allIssues;
  if (reviewFilter !== 'all') {
    filtered = filtered.filter(i => reviewLabelOf(i).key === reviewFilter);
  }
  return filtered;
}

async function bulkApproveSelected() {
  if (SELECTED.size === 0) { alert('선택된 항목이 없습니다.'); return; }
  const targets = allIssues.filter(i => SELECTED.has(i.number));
  if (!confirm(`선택한 ${targets.length}건을 자동 경로로 일괄 승인합니다.\n\n각 항목은 자동 폴더 + 자동 파일명 + 자동 변환 md로 처리됩니다.\n계속할까요?`)) return;

  const box = document.getElementById('bulk-progress');
  box.style.display = 'block';
  box.style.color = 'var(--muted)';
  box.textContent = `진행 중: 0/${targets.length}`;

  let ok = 0, fail = 0;
  const failed = [];
  for (let i = 0; i < targets.length; i++) {
    const issue = targets[i];
    box.textContent = `진행 중: ${i+1}/${targets.length} (✅${ok} / ❌${fail}) — #${issue.number} ${issue.title.slice(0, 50)}`;
    try {
      const res = await fetch(`${WORKER_URL}/admin/approve`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': adminSecret },
        body: JSON.stringify({ issue_number: issue.number }),
      });
      const data = await res.json();
      if (data.ok) {
        ok++;
        allIssues = allIssues.filter(x => x.number !== issue.number);
        SELECTED.delete(issue.number);
      } else {
        fail++;
        failed.push({ number: issue.number, title: issue.title, error: data.error, detail: (data.detail||'').slice(0, 200) });
      }
    } catch (e) {
      fail++;
      failed.push({ number: issue.number, title: issue.title, error: String(e) });
    }
    if (i < targets.length - 1) await new Promise(r => setTimeout(r, 800));
  }

  renderIssues();
  box.style.color = fail === 0 ? '#4ade80' : '#fbbf24';
  let msg = `완료: ✅${ok} / ❌${fail} (총 ${targets.length})`;
  if (fail) {
    msg += '\n실패 항목 (상세):\n' + failed.slice(0, 5).map(f => `  #${f.number} — ${f.error}${f.detail ? '\n      ↳ ' + f.detail : ''}`).join('\n');
    if (failed.length > 5) msg += `\n  ... (${failed.length - 5}건 더)`;
  }
  box.textContent = msg;
  box.style.whiteSpace = 'pre-wrap';
}

// ─── 모달 ─────────────────────────────────────────────────
function openModal(num) {
  const issue = allIssues.find(i => i.number === num);
  if (!issue) return;
  currentIssue = issue;
  rejectBoxOpen = false;
  mdEditorOpen = false;

  const body = issue.body || '';
  document.getElementById('modal-title').textContent = issue.title.replace('[자료 제출] ', '');

  // 필드 파싱
  const fields = [
    { label: '자료 종류', key: '자료 종류' },
    { label: '연도', key: '자료 연도' },
    { label: '관련 지역', key: '관련 지역', full: true },
    { label: '관련 인물·사건', key: '관련 인물·사건', full: true },
    { label: '출처·소장처', key: '자료 출처·소장처', full: true },
    { label: '설명·메모', key: '설명·메모', full: true },
  ];
  const submitter = body.match(/^제출자: (.+)$/m)?.[1] || '익명';

  const rev = reviewLabelOf(issue);
  const issueUrl = safeUrl(issue.html_url);
  document.getElementById('modal-fields').innerHTML = `
    ${fields.map(f => {
      const val = extractSection(body, f.key) || '(없음)';
      return `<div class="field-item${f.full ? ' field-full' : ''}">
        <div class="field-label">${f.label}</div>
        <div class="field-value">${escapeHtmlMultiline(val)}</div>
      </div>`;
    }).join('')}
    <div class="field-item">
      <div class="field-label">제출자</div>
      <div class="field-value">${escapeHtml(submitter)}</div>
    </div>
    <div class="field-item">
      <div class="field-label">검토 상태</div>
      <div class="field-value"><span class="badge ${rev.cls}">${rev.text}</span></div>
    </div>
    <div class="field-item field-full">
      <div class="field-label">GitHub 이슈 (검토자 의견 댓글 확인)</div>
      <div class="field-value">${issueUrl
        ? `<a href="${escapeHtml(issueUrl)}" target="_blank" rel="noopener noreferrer" style="color:var(--blue)">#${issue.number} 열기 →</a>`
        : `#${issue.number} (링크 없음)`}</div>
    </div>
  `;

  // 첨부 파일 파싱 (R2 URL 포함)
  const fileSection = extractSection(body, '첨부 파일 목록');
  const attachHtml = buildAttachments(fileSection);
  document.getElementById('modal-attachments').innerHTML = attachHtml
    ? `<h3>첨부 파일</h3><div class="attachment-grid">${attachHtml}</div>`
    : '';

  // OCR 셀렉트박스 채우기
  populateOcrSelect(fileSection);
  ocrText = '';
  document.getElementById('ocr-result').style.display = 'none';
  document.getElementById('analysis-result').style.display = 'none';
  document.getElementById('ocr-result-label').style.display = 'none';
  document.getElementById('analysis-label').style.display = 'none';
  document.getElementById('ocr-loading').style.display = 'none';

  // 경로 자동 추천
  const region = extractSection(body, '관련 지역') || '';
  const autoFolder = regionToFolder(region);
  const autoFilename = (issue.title.replace('[자료 제출] ','').replace(/[\/\\:*?"<>|]/g,'_').slice(0,60)) + '.md';
  document.getElementById('field-folder').value = autoFolder;
  document.getElementById('field-filename').value = autoFilename;

  // md 미리보기
  document.getElementById('md-editor').style.display = 'none';
  document.querySelector('.md-preview-toggle').textContent = '▶ md 내용 직접 편집';
  document.getElementById('md-editor').value = buildAutoMd(issue);

  // 거부 초기화
  document.getElementById('reject-reason').style.display = 'none';
  document.getElementById('reject-confirm').style.display = 'none';
  document.getElementById('reject-reason').value = '';
  document.getElementById('action-result').textContent = '';
  document.getElementById('action-result').className = 'action-result';
  document.getElementById('btn-approve').disabled = false;
  document.getElementById('btn-reject').disabled = false;

  // 처리 완료(closed) 탭: 수정/보충/회수 노출, 승인/반려 숨김 + 현재 .md 로드
  const isClosed = currentTab === 'closed';
  document.getElementById('btn-recall').style.display = isClosed ? 'inline-flex' : 'none';
  document.getElementById('btn-update').style.display = isClosed ? 'inline-flex' : 'none';
  document.getElementById('btn-supplement').style.display = isClosed ? 'inline-flex' : 'none';
  // AI 재생성: 열린 이슈는 KV preview만, 닫힌 이슈는 GitHub commit까지 — 둘 다 노출
  document.getElementById('btn-regen').style.display = 'inline-flex';
  document.getElementById('btn-regen').textContent = isClosed ? '🔁 AI 재생성 (커밋 덮어쓰기)' : '🔁 AI 재분류 (미리보기 갱신)';
  document.getElementById('btn-approve').style.display = isClosed ? 'none' : 'inline-flex';
  if (isClosed) loadCurrentMdFromGitHub(issue.number);

  // 검토자 수정·보충 제안이 있으면 노란 알림 박스 + 적용 버튼
  renderSuggestionBox(issue);

  document.getElementById('modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

// ─── 토큰 진단 ────────────────────────────────────────────
async function diagnoseToken() {

// ─── 검토자 수정·보충 제안 노출 + 적용 ────────────────────
async function renderSuggestionBox(issue) {
  const box = document.getElementById('suggestion-box');
  box.style.display = 'none';
  box.innerHTML = '';
  try {
    const res = await fetch(`${WORKER_URL}/admin/review-state?issue_number=${issue.number}`, {
      headers: { 'X-Admin-Secret': adminSecret },
    });
    const data = await res.json();
    if (!data.ok || !data.review || !data.review.suggested_md) return;
    const r = data.review;
    const action = r.suggested_kind === 'supplement' ? '보충' : '수정';
    const when = r.suggested_at ? new Date(r.suggested_at).toLocaleString() : '';
    box.style.display = 'block';
    box.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <strong style="color:#f5d35a">📝 검토자 ${action} 제안 — ${escapeHtml(r.suggested_by || '')} / ${escapeHtml(when)}</strong>
        <div style="display:flex;gap:8px">
          <button class="btn-outline" onclick="applySuggestion()" style="background:#3a6a3a;border-color:#5aa05a;color:#cfe9cf">⚡ 이 제안 그대로 적용</button>
          <button class="btn-outline" onclick="copySuggestionToEditor()">📋 md-editor에 복사 (편집 후 적용)</button>
          <button class="btn-outline" onclick="dismissSuggestion()">✕</button>
        </div>
      </div>
      <pre id="suggestion-md" style="max-height:240px;overflow:auto;background:#1a1a0e;padding:8px;border-radius:4px;font-size:12px;white-space:pre-wrap">${escapeHtml(r.suggested_md)}</pre>
    `;
  } catch (e) {
    console.warn('renderSuggestionBox error:', e);
  }
}

function copySuggestionToEditor() {
  const sm = document.getElementById('suggestion-md');
  if (!sm) return;
  document.getElementById('md-editor').value = sm.textContent;
  if (!mdEditorOpen) toggleMdEditor();
  alert('검토자 제안을 md-editor에 복사했습니다. 편집 후 ✏️ 수정 반영 / ➕ 보충 반영을 누르세요.');
}

async function applySuggestion() {
  const sm = document.getElementById('suggestion-md');
  if (!sm || !currentIssue) return;
  document.getElementById('md-editor').value = sm.textContent;
  // closed 이슈면 doUpdate, open이면 doApprove (md_override로 commit)
  if (currentTab === 'closed') {
    if (!confirm(`#${currentIssue.number}: 검토자 제안을 그대로 적용해 .md를 갱신합니다.`)) return;
    document.getElementById('md-editor').value = sm.textContent;
    if (!mdEditorOpen) toggleMdEditor();
    doUpdate('edit');
  } else {
    if (!confirm(`#${currentIssue.number}: 검토자 제안 .md로 승인 처리합니다.`)) return;
    if (!mdEditorOpen) toggleMdEditor();
    doApprove();
  }
}

function dismissSuggestion() {
  document.getElementById('suggestion-box').style.display = 'none';
}

      headers: { 'X-Admin-Secret': adminSecret },
    });

    if (data.ok && data.md) {

  if (!currentIssue) return;
  const md = document.getElementById('md-editor').value;
  if (!md) { alert('md 내용이 비어 있습니다.'); return; }
  const action = kind === 'supplement' ? '보충' : '수정';
  const comment = prompt(`${action} 메모 (커밋 메시지·이슈 코멘트에 기록됩니다):`, '');
  if (comment === null) return;
  if (!confirm(`#${currentIssue.number} 자료를 ${action} 반영합니다.\n\n현재 md-editor 내용으로 GitHub의 .md를 덮어씁니다.\n진행할까요?`)) return;

  const btn = document.getElementById(kind === 'supplement' ? 'btn-supplement' : 'btn-update');
  btn.disabled = true;
  document.getElementById('action-result').textContent = `${action} 반영 중...`;
  document.getElementById('action-result').className = 'action-result';

  try {
    const res = await fetch(`${WORKER_URL}/admin/update`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': adminSecret },
      body: JSON.stringify({ issue_number: currentIssue.number, md, kind, comment }),
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('action-result').className = 'action-result ok';
      const commitUrl = safeUrl(data.commit_url);
      document.getElementById('action-result').innerHTML =
        `✏️ ${action} 반영 완료! <code>${escapeHtml(data.file_path)}</code>` +
        (commitUrl ? `<br><a href="${escapeHtml(commitUrl)}" target="_blank" rel="noopener noreferrer" style="color:var(--blue)">커밋 보기 →</a>` : '');
    } else {
      document.getElementById('action-result').className = 'action-result err';
      document.getElementById('action-result').textContent = `❌ ${action} 실패: ${data.error}${data.detail ? ' / ' + data.detail : ''}`;
      btn.disabled = false;
    }
  } catch (e) {
    document.getElementById('action-result').className = 'action-result err';
    document.getElementById('action-result').textContent = `❌ 네트워크 오류: ${e.message}`;
    btn.disabled = false;
  }
}

// ─── prev vs next 비교 모달 (AI 재생성 결과 검토용) ────────────
let DIFF_CTX = null;  // { issueNumber, isClosed, prev, next }

function openDiffModal({ issueNumber, isClosed, prev, next }) {
  DIFF_CTX = { issueNumber, isClosed, prev, next };
  const prevMd = (prev && prev.md) || '';
  const nextMd = (next && next.md) || '';
  document.getElementById('diff-title').textContent =
    `#${issueNumber} AI 재생성 비교 — ${isClosed ? '커밋 .md vs 새 결과' : 'KV 미리보기 vs 새 결과'}`;
  document.getElementById('diff-prev').innerHTML = renderDiffSide(prevMd, nextMd, 'prev');
  document.getElementById('diff-next').innerHTML = renderDiffSide(prevMd, nextMd, 'next');
  const stats = computeDiffStats(prevMd, nextMd);
  document.getElementById('diff-stats').textContent =
    `+${stats.added}줄 추가 · −${stats.removed}줄 삭제 · ${stats.same}줄 동일`;
  document.getElementById('diff-confirm').textContent =
    isClosed ? '✅ 적용 (GitHub 커밋 + KV 갱신)' : '✅ 적용 (KV 미리보기 갱신 — 검토자에게 새 결과 표시)';
  document.getElementById('diff-modal').classList.add('open');
}

function closeDiffModal() {
  document.getElementById('diff-modal').classList.remove('open');
  DIFF_CTX = null;
}

// LCS 기반 줄 단위 diff — 각 줄이 same / added / removed 중 하나로 분류
function lineDiff(a, b) {
  const A = a.split('\n');
  const B = b.split('\n');
  const m = A.length, n = B.length;
  // LCS 표 (m, n이 클 수 있어 1차원 배열로 메모리 절약)
  const dp = new Array((m + 1) * (n + 1)).fill(0);
  const idx = (i, j) => i * (n + 1) + j;
  for (let i = m - 1; i >= 0; i--) {
    for (let j = n - 1; j >= 0; j--) {
      if (A[i] === B[j]) dp[idx(i, j)] = dp[idx(i + 1, j + 1)] + 1;
      else dp[idx(i, j)] = Math.max(dp[idx(i + 1, j)], dp[idx(i, j + 1)]);
    }
  }
  const ops = [];  // {type:'same'|'add'|'del', a?, b?}
  let i = 0, j = 0;
  while (i < m && j < n) {
    if (A[i] === B[j]) { ops.push({ type: 'same', a: A[i], b: B[j] }); i++; j++; }
    else if (dp[idx(i + 1, j)] >= dp[idx(i, j + 1)]) { ops.push({ type: 'del', a: A[i] }); i++; }
    else { ops.push({ type: 'add', b: B[j] }); j++; }
  }
  while (i < m) { ops.push({ type: 'del', a: A[i++] }); }
  while (j < n) { ops.push({ type: 'add', b: B[j++] }); }
  return ops;
}

function computeDiffStats(prevMd, nextMd) {
  const ops = lineDiff(prevMd, nextMd);
  let added = 0, removed = 0, same = 0;
  for (const o of ops) {
    if (o.type === 'add') added++;
    else if (o.type === 'del') removed++;
    else same++;
  }
  return { added, removed, same };
}

function renderDiffSide(prevMd, nextMd, side) {
  const ops = lineDiff(prevMd, nextMd);
  const lines = [];
  let lnPrev = 0, lnNext = 0;
  for (const o of ops) {
    if (o.type === 'same') {
      lnPrev++; lnNext++;
      const text = side === 'prev' ? o.a : o.b;
      const ln = side === 'prev' ? lnPrev : lnNext;
      lines.push(`<div class="dl same"><span class="dn">${ln}</span><span class="dt">${escapeHtml(text)}</span></div>`);
    } else if (o.type === 'del') {
      lnPrev++;
      if (side === 'prev') {
        lines.push(`<div class="dl del"><span class="dn">${lnPrev}</span><span class="dt">${escapeHtml(o.a)}</span></div>`);
      } else {
        lines.push(`<div class="dl pad"><span class="dn"></span><span class="dt"></span></div>`);
      }
    } else { // add
      lnNext++;
      if (side === 'next') {
        lines.push(`<div class="dl add"><span class="dn">${lnNext}</span><span class="dt">${escapeHtml(o.b)}</span></div>`);
      } else {
        lines.push(`<div class="dl pad"><span class="dn"></span><span class="dt"></span></div>`);
      }
    }
  }
  return lines.join('');
}

async function diffApply() {
  if (!DIFF_CTX) return;
  const { issueNumber, isClosed, next } = DIFF_CTX;
  const confirmBtn = document.getElementById('diff-confirm');
  confirmBtn.disabled = true;
  confirmBtn.textContent = '적용 중...';
  try {
    if (isClosed) {
      // 커밋된 .md 덮어쓰기
      const res = await fetch(`${WORKER_URL}/admin/regenerate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': adminSecret },
        body: JSON.stringify({ issue_number: issueNumber, dry_run: false }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || `HTTP ${res.status}`);
      document.getElementById('action-result').className = 'action-result ok';
      const commitUrl = safeUrl(data.commit_url);
      document.getElementById('action-result').innerHTML =
        `🔁 재생성 적용 완료! <code>${escapeHtml(data.file_path)}</code>` +
        (commitUrl ? `<br><a href="${escapeHtml(commitUrl)}" target="_blank" rel="noopener noreferrer" style="color:var(--blue)">커밋 보기 →</a>` : '');
      // md-editor 갱신
      if (mdEditorOpen) document.getElementById('md-editor').value = next.md;
    } else {
      // KV preview만 갱신 — 검토자가 새 결과를 보게 됨
      const res = await fetch(`${WORKER_URL}/admin/apply-preview`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': adminSecret },
        body: JSON.stringify({
          issue_number: issueNumber,
          md: next.md, folder: next.folder, filename: next.filename, kind: next.kind,
        }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || `HTTP ${res.status}`);
      document.getElementById('action-result').className = 'action-result ok';
      document.getElementById('action-result').textContent =
        '🔁 새 미리보기 적용 완료 — 검토자에게 새 분류가 표시됩니다 (커밋 안 됨).';
      // md-editor 갱신
      if (mdEditorOpen) document.getElementById('md-editor').value = next.md;
      // 현재 issue.preview도 갱신
      if (currentIssue) {
        currentIssue.preview = currentIssue.preview || {};
        currentIssue.preview.md = next.md;
        currentIssue.preview.folder = next.folder;
        currentIssue.preview.filename = next.filename;
        currentIssue.preview.kind = next.kind;
      }
    }
    closeDiffModal();
  } catch (e) {
    confirmBtn.disabled = false;
    confirmBtn.textContent = '✅ 적용';
    alert('적용 실패: ' + e.message);
  }
}

// ─── 사후 회수 (closed 이슈 + 검토자 반려추천 후) ────────────
async function doRecall() {
  if (!currentIssue) return;
  const reviewLabel = reviewLabelOf(currentIssue);
  const labelHint = reviewLabel.key === 'reject' ? ' (검토자 반려추천)' :
                    reviewLabel.key === 'edit'   ? ' (검토자 수정필요)' :
                    reviewLabel.key === 'reroute'? ' (검토자 분류재검토)' : '';
  const reason = prompt(`회수 사유를 입력하세요${labelHint}\n\n` +
                        `회수 시:\n  · GitHub Pages에서 해당 .md 삭제\n  · 이슈 다시 열림 (open)\n  · 회수 코멘트 추가\n\n사유:`,
                        reviewLabel.key === 'reject' ? '검토자 반려추천' : '');
  if (!reason) return;
  if (!confirm(`#${currentIssue.number} 자료를 회수합니다.\n\n[GitHub Pages에서 .md 파일 삭제 + 이슈 reopen]\n\n진행할까요?`)) return;

  document.getElementById('btn-recall').disabled = true;
  document.getElementById('action-result').textContent = '회수 중...';
  document.getElementById('action-result').className = 'action-result';

  try {
    const res = await fetch(`${WORKER_URL}/admin/recall`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': adminSecret },
      body: JSON.stringify({ issue_number: currentIssue.number, reason }),
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('action-result').className = 'action-result ok';
      document.getElementById('action-result').innerHTML =
        `🔄 회수 완료 — <code>${escapeHtml(data.file_path)}</code> 삭제됨, 이슈 재오픈`;
      allIssues = allIssues.filter(i => i.number !== currentIssue.number);
    } else {
      document.getElementById('action-result').className = 'action-result err';
      document.getElementById('action-result').textContent = `❌ 회수 실패: ${data.error}${data.detail ? ' / ' + data.detail : ''}`;
      document.getElementById('btn-recall').disabled = false;
    }
  } catch (e) {
    document.getElementById('action-result').className = 'action-result err';
    document.getElementById('action-result').textContent = `❌ 네트워크 오류: ${e.message}`;
    document.getElementById('btn-recall').disabled = false;
  }
}

function buildAttachments(fileSection) {
  if (!fileSection) return '';
  const lines = fileSection.split('\n').filter(l => l.trim().startsWith('-'));
  return lines.map(line => {
    // 마크다운 이미지: - ![이름](URL)
    const imgMatch = line.match(/!\[([^\]]*)\]\((https?:\/\/[^\)]+)\)/);
    if (imgMatch) {
      const url = safeUrl(imgMatch[2]);
      const alt = imgMatch[1];
      if (!url) return '';
      // openFullscreen은 onclick 인라인에 URL을 박아 따옴표 escape 위험이 있어
      // data 속성으로 전달하고 위임 핸들러로 처리
      return `<div class="attachment-item">
        <img src="${escapeHtml(url)}" alt="${escapeHtml(alt)}" data-fs="${escapeHtml(url)}" onclick="openFullscreen(this.dataset.fs)">
        <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(alt)}</a>
      </div>`;
    }
    // 마크다운 링크: - [이름](URL)
    const linkMatch = line.match(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/);
    if (linkMatch) {
      const url = safeUrl(linkMatch[2]);
      const name = linkMatch[1];
      if (!url) return '';
      const isPdf = url.toLowerCase().endsWith('.pdf') || name.toLowerCase().endsWith('.pdf');
      return `<div class="attachment-item">
        <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${isPdf ? '📄' : '📎'} ${escapeHtml(name)}</a>
      </div>`;
    }
    // 일반 텍스트 (구버전 - 파일명만)
    const text = line.replace(/^-\s*/, '');
    return `<div class="attachment-item"><span style="color:var(--muted);font-size:13px;">📎 ${escapeHtml(text)}</span></div>`;
  }).join('');
}

async function doApprove() {
  if (!currentIssue) return;
  const folder   = document.getElementById('field-folder').value.trim();
  const filename = document.getElementById('field-filename').value.trim();
  if (!folder || !filename) { alert('폴더 경로와 파일명을 입력해주세요.'); return; }

  document.getElementById('btn-approve').disabled = true;
  document.getElementById('action-result').textContent = '아카이브에 반영 중...';
  document.getElementById('action-result').className = 'action-result';

  const md_override = mdEditorOpen ? document.getElementById('md-editor').value : undefined;

  const res = await fetch(`${WORKER_URL}/admin/approve`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': adminSecret },
    body: JSON.stringify({ issue_number: currentIssue.number, folder_override: folder, filename_override: filename, md_override }),
  });
  const data = await res.json();

  if (data.ok) {
    document.getElementById('action-result').className = 'action-result ok';
    const commitUrl = safeUrl(data.commit_url);
    document.getElementById('action-result').innerHTML =
      `✅ 반영 완료! <code>${escapeHtml(data.file_path)}</code>` +
      (commitUrl ? `<br><a href="${escapeHtml(commitUrl)}" target="_blank" rel="noopener noreferrer" style="color:var(--blue)">커밋 보기 →</a>` : '');
    allIssues = allIssues.filter(i => i.number !== currentIssue.number);
  } else {
    document.getElementById('action-result').className = 'action-result err';
    document.getElementById('action-result').textContent = `❌ 오류: ${data.error}`;
    document.getElementById('btn-approve').disabled = false;
  }
}

// ─── 한글 띄어쓰기 정리 (Workers AI Llama) ────────────────
async function normalizeKoreanInMd() {
  const editor = document.getElementById('md-editor');
  const btn    = document.getElementById('btn-normalize-spacing');
  let md = editor.value;
  if (!md) { alert('먼저 미리보기 md를 생성해주세요.'); return; }

  // ## 본문 — 한글 변환 (네이버 OCR) 코드블록 추출
  const re = /(## 본문 — 한글 변환[^\n]*\n+)```\n?([\s\S]*?)\n?```/m;
  const m = md.match(re);
  if (!m) { alert('한글 변환 본문 섹션을 찾지 못했습니다 (## 본문 — 한글 변환 ...).'); return; }
  const koreanRaw = m[2];

  btn.disabled = true;
  btn.textContent = '🪄 정리 중... (Llama 호출, 15~40초)';

  try {
    const res = await fetch(`${WORKER_URL}/admin/normalize-spacing`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': adminSecret },
      body: JSON.stringify({ text: koreanRaw }),
    });
    const data = await res.json();
    if (!data.ok || !data.normalized) {
      alert(`정리 실패: ${data.error || '알 수 없는 오류'}`);
      return;
    }
    // 헤딩을 "(띄어쓰기 정리)"로 바꾸고 코드블록 교체
    const newSection = `## 본문 — 한글 변환 (띄어쓰기 정리, Llama 3.3 70B)\n\n\`\`\`\n${data.normalized}\n\`\`\``;
    md = md.replace(re, newSection);
    editor.value = md;
    // md-editor가 닫혀있으면 열어서 사용자가 결과 확인 가능
    if (!mdEditorOpen) toggleMdEditor();
    alert('✅ 띄어쓰기 정리 완료. md-editor에서 결과를 확인하고 승인하세요.');
  } catch (e) {
    alert(`정리 중 오류: ${e.message || e}`);
  } finally {
    btn.disabled = false;
    btn.textContent = '🪄 한글 띄어쓰기 정리';
  }
}

// ─── 일괄 승인 (현재 화면 필터 결과) ──────────────────────
async function bulkApproveFiltered() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let filtered = q
    ? allIssues.filter(i => i.title.toLowerCase().includes(q) || (i.body || '').toLowerCase().includes(q))
    : allIssues;
  if (reviewFilter !== 'all') {
    filtered = filtered.filter(i => reviewLabelOf(i).key === reviewFilter);
  }
  if (filtered.length === 0) { alert('일괄 승인할 항목이 없습니다.'); return; }

  const yes = confirm(`현재 필터 결과 ${filtered.length}건을 자동 경로로 일괄 승인합니다.\n\n` +
                      `각 항목은 자동 폴더 + 자동 파일명 + 자동 변환 md로 처리됩니다.\n` +
                      `(개별 검수가 필요하면 카드 클릭 → 모달에서 처리하세요.)\n\n계속할까요?`);
  if (!yes) return;

  const box = document.getElementById('bulk-progress');
  box.style.display = 'block';
  box.style.color = 'var(--muted)';
  box.textContent = `진행 중: 0/${filtered.length}`;

  let ok = 0, fail = 0;
  const failed = [];
  for (let i = 0; i < filtered.length; i++) {
    const issue = filtered[i];
    box.textContent = `진행 중: ${i+1}/${filtered.length} (✅${ok} / ❌${fail}) — #${issue.number} ${issue.title.slice(0, 50)}`;
    try {
      const res = await fetch(`${WORKER_URL}/admin/approve`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': adminSecret },
        body: JSON.stringify({ issue_number: issue.number }),  // override 없음 = worker 자동 경로/파일명/md
      });
      const data = await res.json();
      if (data.ok) {
        ok++;
        allIssues = allIssues.filter(x => x.number !== issue.number);
      } else {
        fail++;
        failed.push({ number: issue.number, title: issue.title, error: data.error, detail: (data.detail||'').slice(0, 200) });
      }
    } catch (e) {
      fail++;
      failed.push({ number: issue.number, title: issue.title, error: String(e) });
    }
    // GitHub API rate limit 보호 (초당 1건 페이스)
    if (i < filtered.length - 1) await new Promise(r => setTimeout(r, 800));
  }

  renderIssues();
  box.style.color = fail === 0 ? '#4ade80' : '#fbbf24';
  let msg = `완료: ✅${ok} / ❌${fail} (총 ${filtered.length})`;
  if (fail) {
    msg += '\n실패 항목 (상세):\n' + failed.slice(0, 5).map(f => `  #${f.number} — ${f.error}${f.detail ? '\n      ↳ ' + f.detail : ''}`).join('\n');
    if (failed.length > 5) msg += `\n  ... (${failed.length - 5}건 더)`;
  }
  box.textContent = msg;
  box.style.whiteSpace = 'pre-wrap';
}

let ocrText = '';

function populateOcrSelect(fileSection) {
  const sel = document.getElementById('ocr-file-select');
  sel.innerHTML = '<option value="">— 분석할 이미지 선택 —</option>';
  if (!fileSection) return;
  const lines = fileSection.split('\n').filter(l => l.trim().startsWith('-'));
  lines.forEach(line => {
    const imgMatch = line.match(/!\[([^\]]*)\]\((https?:\/\/[^\)]+)\)/);
    const linkMatch = line.match(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/);
    if (imgMatch) {
      const opt = document.createElement('option');
      opt.value = imgMatch[2];
      opt.textContent = imgMatch[1] || imgMatch[2].split('/').pop();
      sel.appendChild(opt);
    } else if (linkMatch && !linkMatch[2].endsWith('.pdf')) {
      const opt = document.createElement('option');
      opt.value = linkMatch[2];
      opt.textContent = linkMatch[1];
      sel.appendChild(opt);
    }
  });
}

    const res = await fetch(`${WORKER_URL}/admin/ocr`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': adminSecret },
      body: JSON.stringify({ image_url: url, title }),
    });

// ─── 유틸 ─────────────────────────────────────────────────
// submit.html이 사용하는 표준 8개 섹션 헤딩만 종료자로 인정.
// 사용자 입력 note에 비표준 ## 헤딩(예: "## 본문 — 한자 원문")이 있어도
// 다음 표준 섹션을 만나기 전까지 본문이 잘리지 않도록 한다.
const STD_HEADINGS = [
  '자료 제목', '자료 종류', '자료 연도', '관련 지역',
  '관련 인물·사건', '자료 출처·소장처', '설명·메모', '첨부 파일 목록',
];
function _escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function extractSection(body, heading) {
  if (!body) return '';
  // 'm' 플래그 제거 — 'm' 모드에서 $는 줄 끝에 매치되어 첫 줄 직후
  // 매치가 종료되는 버그가 있었음. input end만 종료자로 인정.
  const enders = STD_HEADINGS.filter(h => h !== heading)
                              .map(h => `\\n## ${_escRe(h)}`).join('|');
  const re = new RegExp(`## ${_escRe(heading)}\\s*\\n([\\s\\S]*?)(?=${enders}|\\n---\\n|$(?![\\s\\S]))`);
  const m = body.match(re);
  return m ? m[1].trim() : '';
}

function regionToFolder(region) {
  if (region.includes('예산')) return '04-지역/충남/예산';
  if (region.includes('공주')) return '04-지역/충남/공주';
  if (region.includes('천안') || region.includes('아산')) return '04-지역/충남/천안';
  if (region.includes('충남')) return '04-지역/충남';
  if (region.includes('청주') || region.includes('충북')) return '04-지역/충북/청주';
  if (region.includes('충북')) return '04-지역/충북';
  if (region.includes('서울') || region.includes('경성')) return '04-지역/서울';
  return '04-지역/미분류';
}

// note(설명·메모) 안에서 ## 본문 — ... 다음 ``` ... ``` 코드블록을 추출.
// 신문기사 타입에서 한자 원문 / 한글 변환 본문이 코드블록으로 들어있다.
function extractCodeBlockUnder(noteText, headingPattern) {
  if (!noteText) return '';
  const re = new RegExp(`## ${headingPattern}[^\\n]*\\n+\`\`\`\\n?([\\s\\S]*?)\\n?\`\`\``, 'm');
  const m = noteText.match(re);
  return m ? m[1].trim() : '';
}

// note에서 네이버 원기사 URL 추출.
function extractNaverUrl(noteText) {
  if (!noteText) return '';
  const m = noteText.match(/https:\/\/newslibrary\.naver\.com\/viewer\/[^\s\)\"<>]+/);
  return m ? m[0] : '';
}

// 일반명사(학생·교사 등) — 인물 오인식 방지
const NON_PERSON_WORDS = new Set([
  '학생', '교사', '경찰', '주민', '청년', '관계자', '인사', '동지',
  '여러분', '학교', '직원', '교원', '당국', '관청', '동민', '일동',
  '소년', '소녀', '부인', '농민', '노동자', '사람', '시민', '검사', '판사',
  '간부', '회원', '대표', '단원', '인원', '전부', '일부', '명단',
]);

// note 본문에서 한글(한자) 패턴으로 인물명 추출
function extractInlinePersons(note) {
  const out = new Set();
  if (!note) return out;
  for (const m of note.matchAll(/([가-힣]{2,5})\s*\([一-龥\s]{1,8}\)/g)) {
    if (!NON_PERSON_WORDS.has(m[1])) out.add(m[1]);
  }
  return out;
}

// 한자 병기 단어만 추출 — OCR 한글 본문이 띄어쓰기 안 된 상태에서
// 어미·조사가 합쳐진 false positive(예: "하면서보습학교")를 차단.
const SCHOOL_KW = /(?:학교|고등학교|고보|농교|보교|상교|중학|소학|보습)$/;
const EVENT_KW  = /(?:동맹휴학|맹휴|만세항쟁|만세운동|시위|격문|항쟁|운동|사건)$/;
function extractSchools(text) {
  const out = new Set();
  if (!text) return out;
  for (const m of text.matchAll(/([가-힣]{2,10})\s*\([一-龥\s]{2,15}\)/g)) {
    const k = m[1];
    if (NON_PERSON_WORDS.has(k)) continue;
    if (SCHOOL_KW.test(k)) out.add(k);
  }
  return out;
}
function extractEvents(text) {
  const out = new Set();
  if (!text) return out;
  // 본문 한글(한자) 패턴
  for (const m of text.matchAll(/([가-힣]{2,10})\s*\([一-龥\s]{2,15}\)/g)) {
    const k = m[1];
    if (NON_PERSON_WORDS.has(k)) continue;
    if (EVENT_KW.test(k)) out.add(k);
  }
  // 제목에서 안전한 키워드 (제목은 띄어쓰기 정상)
  for (const m of text.matchAll(/(?:[가-힣]{2,6}\s+)?(?:동맹휴학|맹휴|만세항쟁|만세운동|시위|격문\s*사건|항쟁|운동|사건)/g)) {
    const e = m[0].trim();
    if (e.length >= 3 && e.length <= 14) out.add(e);
  }
  return out;
}

function buildAutoMd(issue) {
  // GitHub API issue.body는 \r\n 라인엔딩 — 정규식 [^\n]*가 \r 포함하지
  // 않도록 정규화.
  const body = (issue.body || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const title   = extractSection(body, '자료 제목') || issue.title.replace('[자료 제출] ','');
  const type    = extractSection(body, '자료 종류');
  const date    = extractSection(body, '자료 연도');
  const region  = extractSection(body, '관련 지역');
  const persons = extractSection(body, '관련 인물·사건');
  const source  = extractSection(body, '자료 출처·소장처');
  const note    = extractSection(body, '설명·메모');
  const files   = extractSection(body, '첨부 파일 목록');
  const sub     = (body.match(/^제출자: (.+)$/m) || [])[1] || '';

  // 신문기사 타입: note에 ## 본문 — 한자 / ## 본문 — 한글 변환 코드블록이 있음.
  const isNewspaper = /신문|기사/.test(type) || /신문기사/.test(title);
  const hanjaText = isNewspaper ? extractCodeBlockUnder(note, '본문\\s*[—-]+\\s*\\d{4}|본문\\s*[—-]+\\s*한자|본문\\s*\\(?한자') : '';
  const koreanText = isNewspaper ? extractCodeBlockUnder(note, '본문\\s*[—-]+\\s*한글|본문\\s*\\(?한글') : '';
  const naverUrl = isNewspaper ? extractNaverUrl(note) : '';
  const issueImg = (note.match(/!\[[^\]]*\]\((https?:\/\/[^\)]+)\)/) || [])[1] || '';

  // 인물·학교·사건 자동 추출 (note 본문 + persons 필드)
  const personSet = extractInlinePersons(note);
  const schoolSet = extractSchools(note);
  const eventSet = extractEvents(`${title} ${note}`);
  // persons 필드도 고려
  if (persons && persons !== '(미기재)') {
    persons.split(/[,，、·\n]+/).map(s => s.trim()).filter(Boolean).forEach(t => {
      const k = t.replace(/\([^)]*\)/g, '').replace(/[一-龥]+/g, '').trim();
      if (!k || NON_PERSON_WORDS.has(k)) return;
      if (/(학교|고보|고등학교|보습)/.test(k)) schoolSet.add(k);
      else if (/(운동|항쟁|시위|맹휴|동맹휴학|사건|격문)/.test(k)) eventSet.add(k);
      else if (/^[가-힣]{2,5}$/.test(k)) personSet.add(k);
    });
  }

  const lines = [
    `# ${title}`, ``,
    `## 자료 정보`, ``,
    `- **자료 종류**: ${type || '미상'}`,
    `- **연도**: ${date || '미상'}`,
    `- **지역**: ${region || '미상'}`,
    `- **출처**: ${source || '미기재'}`,
  ];
  if (naverUrl) lines.push(`- **원기사**: [네이버 뉴스라이브러리](${naverUrl})`);
  lines.push(`- **제출자**: ${sub}`);
  lines.push(`- **원본 이슈**: [#${issue.number}](${issue.html_url})`);
  lines.push(``);

  if (issueImg) {
    lines.push(`## 기사 이미지`, ``, `![${title}](${issueImg})`, ``);
  }

  if (hanjaText) {
    lines.push(`## 본문 — 원문 (한자)`, ``, '```', hanjaText, '```', ``);
  }
  if (koreanText) {
    lines.push(`## 본문 — 한글 변환 (네이버 OCR)`, ``, '```', koreanText, '```', ``);
  }
  if (!hanjaText && !koreanText) {
    lines.push(`## 설명·메모`, ``, note || '(없음)', ``);
  }

  // 옵시디언 그래프 노드 생성을 위한 [[wikilink]] 섹션
  if (personSet.size) {
    lines.push(`## 관련 인물`, ``);
    [...personSet].forEach(p => lines.push(`- [[${p}]]`));
    lines.push(``);
  }
  if (schoolSet.size) {
    lines.push(`## 관련 학교`, ``);
    [...schoolSet].forEach(s => lines.push(`- [[${s}]]`));
    lines.push(``);
  }
  if (eventSet.size) {
    lines.push(`## 관련 사건`, ``);
    [...eventSet].forEach(e => lines.push(`- [[${e}]]`));
    lines.push(``);
  }
  // 지역 백링크
  const regionMatch = region && region.match(/([가-힣]{2,3}(?:시|군|구|도))/);
  if (regionMatch) {
    lines.push(`## 관련 지역`, ``, `- [[${regionMatch[1]}]]`, ``);
  }

  lines.push(`## 첨부 파일`, ``, files || '(없음)');
  return lines.join('\n');
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const d = Math.floor(diff / 86400000);
  if (d === 0) return '오늘';
  if (d === 1) return '어제';
  if (d < 30) return `${d}일 전`;
  return new Date(iso).toLocaleDateString('ko-KR');
}
