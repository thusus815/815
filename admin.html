<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>кҙҖлҰ¬мһҗ вҖ” лӮҳмқҳ 3В·1</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card: #20232f;
    --border: #2e3142;
    --gold: #c9a84c;
    --gold-dim: #8a6f30;
    --text: #e8e6e0;
    --muted: #7a7a8a;
    --green: #3dba7a;
    --red: #e05c5c;
    --blue: #5b8dee;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Serif KR', Georgia, serif; min-height: 100vh; }

  /* лЎңк·ёмқё */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  .login-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 48px 40px; width: 100%; max-width: 400px;
    text-align: center;
  }
  .login-box h1 { font-size: 22px; margin-bottom: 8px; color: var(--gold); }
  .login-box p { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .login-box input {
    width: 100%; padding: 12px 16px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text); font-size: 15px; margin-bottom: 16px;
  }
  .login-box button {
    width: 100%; padding: 13px; background: var(--gold); color: #1a1200;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: opacity .2s;
  }
  .login-box button:hover { opacity: .85; }
  .login-err { color: var(--red); font-size: 13px; margin-top: 12px; }

  /* л©”мқё л Ҳмқҙм•„мӣғ */
  #app { display: none; }
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 32px; display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 18px; color: var(--gold); flex: 1; }
  header .logout { color: var(--muted); font-size: 13px; cursor: pointer; }
  header .logout:hover { color: var(--text); }

  .tabs {
    padding: 16px 32px 0; border-bottom: 1px solid var(--border);
    display: flex; gap: 0;
  }
  .tab-btn {
    padding: 10px 24px; background: none; border: none; color: var(--muted);
    font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent;
    transition: all .2s;
  }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  .main { padding: 28px 32px; max-width: 1100px; margin: 0 auto; }

  /* мқҙмҠҲ лӘ©лЎқ */
  .filter-row { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
  .filter-row select, .filter-row input {
    padding: 8px 12px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: 14px;
  }
  .refresh-btn {
    padding: 8px 18px; background: var(--card); border: 1px solid var(--border);
    color: var(--text); border-radius: 7px; cursor: pointer; font-size: 14px;
  }
  .refresh-btn:hover { border-color: var(--gold); }

  .issue-list { display: flex; flex-direction: column; gap: 10px; }
  .issue-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px 20px; cursor: pointer; transition: border-color .2s;
    display: flex; gap: 16px; align-items: flex-start;
  }
  .issue-card:hover { border-color: var(--gold-dim); }
  .issue-num { color: var(--muted); font-size: 13px; min-width: 36px; padding-top: 2px; }
  .issue-body { flex: 1; }
  .issue-title { font-size: 15px; margin-bottom: 6px; }
  .issue-meta { font-size: 12px; color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
  }
  .badge-open { background: #1a3a1a; color: var(--green); }
  .badge-closed { background: #2a1a1a; color: var(--muted); }
  .badge-review-ok      { background: #1a3a2a; color: #5dba9a; }
  .badge-review-edit    { background: #3a2e1a; color: #e0b85c; }
  .badge-review-reroute { background: #1a2a3a; color: var(--blue); }
  .badge-review-reject  { background: #3a1a1a; color: var(--red); }
  .badge-review-none    { background: #2a2a3a; color: var(--muted); }

  /* кІҖнҶ  м§„н–ү мҡ”м•Ҫ */
  .summary-bar {
    display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 18px; margin-bottom: 14px;
    font-size: 13px;
  }
  .summary-item { color: var(--muted); cursor: pointer; padding: 2px 6px; border-radius: 5px; transition: background .15s; }
  .summary-item:hover { background: var(--card); }
  .summary-item.active { background: var(--card); color: var(--text); }
  .summary-item strong { color: var(--text); margin-left: 4px; }
  .summary-divider { color: var(--border); }

  .empty-msg { color: var(--muted); text-align: center; padding: 60px 0; font-size: 15px; }
  .loading-msg { color: var(--muted); text-align: center; padding: 40px 0; }

  /* мғҒм„ё лӘЁлӢ¬ */
  .modal-backdrop {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75);
    z-index: 100; overflow-y: auto; padding: 32px 16px;
  }
  .modal-backdrop.open { display: flex; align-items: flex-start; justify-content: center; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); width: 100%; max-width: 760px;
    padding: 32px; position: relative;
  }
  .modal-close {
    position: absolute; top: 16px; right: 20px; background: none; border: none;
    color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1;
  }
  .modal-close:hover { color: var(--text); }
  .modal h2 { font-size: 18px; margin-bottom: 20px; padding-right: 32px; }

  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .field-item { background: var(--card); border-radius: 8px; padding: 12px 14px; }
  .field-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .field-value { font-size: 14px; word-break: break-all; }
  .field-full { grid-column: 1 / -1; }

  /* мқҙлҜём§Җ лҜёлҰ¬ліҙкё° */
  .attachments-section { margin-bottom: 20px; }
  .attachments-section h3 { font-size: 14px; color: var(--gold); margin-bottom: 12px; }
  .attachment-grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .attachment-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .attachment-item img {
    max-width: 200px; max-height: 160px; border-radius: 6px;
    border: 1px solid var(--border); cursor: pointer; object-fit: cover;
  }
  .attachment-item img:hover { border-color: var(--gold); }
  .attachment-item a {
    font-size: 12px; color: var(--blue); text-decoration: none; max-width: 200px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center;
  }
  .attachment-item a:hover { text-decoration: underline; }

  /* OCR / л¶„м„қ мҳҒм—ӯ */
  .analysis-section {
    border-top: 1px solid var(--border); padding-top: 20px; margin-top: 4px; margin-bottom: 4px;
  }
  .analysis-section h3 { font-size: 14px; color: var(--gold); margin-bottom: 14px; }
  .ocr-select-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .ocr-select-row select {
    flex: 1; padding: 8px 12px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: 13px;
  }
  .btn-ocr {
    padding: 9px 20px; background: var(--blue); color: #fff;
    border: none; border-radius: 8px; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: opacity .2s; white-space: nowrap;
  }
  .btn-ocr:hover { opacity: .85; }
  .btn-ocr:disabled { opacity: .4; cursor: not-allowed; }
  .btn-analyze {
    padding: 9px 20px; background: #6c4fa8; color: #fff;
    border: none; border-radius: 8px; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: opacity .2s; white-space: nowrap;
  }
  .btn-analyze:hover { opacity: .85; }
  .btn-analyze:disabled { opacity: .4; cursor: not-allowed; }
  .ocr-result {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; font-size: 13px; font-family: monospace; white-space: pre-wrap;
    max-height: 260px; overflow-y: auto; margin-bottom: 10px; display: none;
  }
  .analysis-result {
    background: #1a1a2e; border: 1px solid #3a2a6e; border-radius: 8px;
    padding: 14px; font-size: 13px; line-height: 1.7; white-space: pre-wrap;
    max-height: 320px; overflow-y: auto; display: none;
  }
  .analysis-loading { color: var(--muted); font-size: 13px; margin: 8px 0; display: none; }

  /* мҠ№мқё/кұ°л¶Җ мҳҒм—ӯ */
  .action-section { border-top: 1px solid var(--border); padding-top: 20px; margin-top: 4px; }
  .action-section h3 { font-size: 14px; color: var(--gold); margin-bottom: 14px; }
  .path-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .path-row input {
    flex: 1; padding: 9px 12px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: 13px; font-family: monospace;
  }
  .path-row label { font-size: 12px; color: var(--muted); margin-bottom: 4px; display: block; }
  .path-group { flex: 1; }
  .md-preview-toggle {
    font-size: 12px; color: var(--blue); cursor: pointer; margin-bottom: 10px; display: inline-block;
  }
  .md-editor {
    width: 100%; height: 220px; padding: 10px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text); font-size: 12px; font-family: monospace;
    resize: vertical; display: none; margin-bottom: 10px;
  }
  .reject-reason {
    width: 100%; padding: 9px 12px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: 13px;
    margin-bottom: 12px; display: none;
  }
  .action-btns { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-approve {
    padding: 11px 28px; background: var(--green); color: #0a1a10;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: opacity .2s;
  }
  .btn-approve:hover { opacity: .85; }
  .btn-approve:disabled { opacity: .4; cursor: not-allowed; }
  .btn-reject {
    padding: 11px 28px; background: var(--red); color: #fff;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: opacity .2s;
  }
  .btn-reject:hover { opacity: .85; }
  .btn-reject:disabled { opacity: .4; cursor: not-allowed; }
  .btn-outline {
    padding: 11px 20px; background: none; border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; font-size: 13px; cursor: pointer;
  }
  .btn-outline:hover { border-color: var(--gold); }
  .action-result { margin-top: 12px; font-size: 13px; }
  .action-result.ok { color: var(--green); }
  .action-result.err { color: var(--red); }

  /* мқҙлҜём§Җ м „мІҙнҷ”л©ҙ */
  .img-fullscreen {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.9);
    z-index: 200; align-items: center; justify-content: center; cursor: zoom-out;
  }
  .img-fullscreen.open { display: flex; }
  .img-fullscreen img { max-width: 94vw; max-height: 94vh; border-radius: 6px; }

  @media (max-width: 600px) {
    .field-grid { grid-template-columns: 1fr; }
    .main { padding: 16px; }
    header { padding: 12px 16px; }
    .tabs { padding: 12px 16px 0; }
  }
</style>
</head>
<body>

<!-- лЎңк·ёмқё -->
<div id="login-screen">
  <div class="login-box">
    <h1>лӮҳмқҳ 3В·1</h1>
    <p>кҙҖлҰ¬мһҗ м „мҡ© нҺҳмқҙм§Җмһ…лӢҲлӢӨ</p>
    <input type="password" id="secret-input" placeholder="кҙҖлҰ¬мһҗ л№„л°ҖлІҲнҳё" autocomplete="current-password">
    <button onclick="doLogin()">лЎңк·ёмқё</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- л©”мқё м•ұ -->
<div id="app">
  <header>
    <h1>лӮҳмқҳ 3В·1 вҖ” кҙҖлҰ¬мһҗ</h1>
    <span class="logout" onclick="doLogout()">лЎңк·ём•„мӣғ</span>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('issues')">м ңм¶ң мһҗлЈҢ</button>
    <button class="tab-btn" onclick="switchTab('closed')">мІҳлҰ¬ мҷ„лЈҢ</button>
  </div>

  <div class="main">
    <div class="filter-row">
      <input type="text" id="search-input" placeholder="м ңлӘ©В·м§Җм—ӯ кІҖмғү..." oninput="renderIssues()" style="flex:1">
      <button class="refresh-btn" onclick="bulkApproveFiltered()" id="btn-bulk-approve" title="кІҖмғүВ·лқјлІЁ н•„н„° кІ°кіјлҘј мһҗлҸҷ кІҪлЎңлЎң мқјкҙ„ мҠ№мқё">вҡЎ н•„н„° мқјкҙ„ мҠ№мқё</button>
      <button class="refresh-btn" onclick="loadIssues()">вҶ» мғҲлЎңкі м№Ё</button>
    </div>
    <div id="bulk-progress" style="display:none;margin-bottom:12px;padding:10px 14px;background:#1d2333;border:1px solid var(--border);border-radius:8px;font-size:13px"></div>
    <div id="issue-list-area">
      <div class="loading-msg">л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...</div>
    </div>
  </div>
</div>

<!-- мғҒм„ё лӘЁлӢ¬ -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <button class="modal-close" onclick="closeModalDirect()">вң•</button>
    <h2 id="modal-title"></h2>

    <div class="field-grid" id="modal-fields"></div>

    <div class="attachments-section" id="modal-attachments"></div>

    <div class="analysis-section">
      <h3>рҹ“„ н…ҚмҠӨнҠё м¶”м¶ң В· мӮ¬лЈҢ л¶„м„қ</h3>
      <div class="ocr-select-row">
        <select id="ocr-file-select">
          <option value="">вҖ” л¶„м„қн•  мқҙлҜём§Җ м„ нғқ вҖ”</option>
        </select>
        <button class="btn-ocr" id="btn-ocr" onclick="doOcr()">рҹ”Қ Gemini л¶„м„қ</button>
      </div>
      <div class="analysis-loading" id="ocr-loading">вҸі Gemini л¶„м„қ мӨ‘ (15~30мҙҲ)...</div>
      <div class="analysis-loading" id="analyze-loading" style="display:none"></div>
      <div style="margin-bottom:6px;font-size:12px;color:var(--muted)" id="ocr-result-label" style="display:none">рҹ“қ м¶”м¶ң н…ҚмҠӨнҠё</div>
      <div class="ocr-result" id="ocr-result"></div>
      <div style="margin-bottom:6px;font-size:12px;color:#9b7fe8;margin-top:10px" id="analysis-label" style="display:none">рҹӨ– мӮ¬лЈҢ л¶„м„қ кІ°кіј</div>
      <div class="analysis-result" id="analysis-result"></div>
    </div>

    <div class="action-section">
      <h3>кҙҖлҰ¬мһҗ мІҳлҰ¬</h3>
      <div class="path-row">
        <div class="path-group">
          <label>м ҖмһҘ нҸҙлҚ” кІҪлЎң</label>
          <input type="text" id="field-folder" placeholder="04-м§Җм—ӯ/м¶©лӮЁ/мҳҲмӮ°">
        </div>
        <div class="path-group">
          <label>нҢҢмқјлӘ… (.md)</label>
          <input type="text" id="field-filename" placeholder="мһҗлЈҢм ңлӘ©.md">
        </div>
      </div>
      <span class="md-preview-toggle" onclick="toggleMdEditor()">в–¶ md лӮҙмҡ© м§Ғм ‘ нҺём§‘</span>
      <textarea class="md-editor" id="md-editor"></textarea>

      <div class="action-btns">
        <button class="btn-approve" id="btn-approve" onclick="doApprove()">вң… мҠ№мқё В· м•„м№ҙмқҙлёҢ л°ҳмҳҒ</button>
        <button class="btn-outline" onclick="toggleRejectBox()">вҡ пёҸ л°ҳл Ө</button>
      </div>

      <textarea class="reject-reason" id="reject-reason" rows="3" placeholder="л°ҳл Ө мӮ¬мң лҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”..."></textarea>
      <div id="reject-confirm" style="display:none; margin-top:8px;">
        <button class="btn-reject" id="btn-reject" onclick="doReject()">л°ҳл Ө мІҳлҰ¬ нҷ•м •</button>
      </div>

      <div class="action-result" id="action-result"></div>
    </div>
  </div>
</div>

<!-- мқҙлҜём§Җ м „мІҙнҷ”л©ҙ -->
<div class="img-fullscreen" id="img-fullscreen" onclick="closeFullscreen()">
  <img id="fullscreen-img" src="" alt="">
</div>

<script>
const WORKER_URL = 'https://815-chat.sungandpartners.workers.dev';
let adminSecret = '';
let allIssues = [];
let currentIssue = null;
let currentTab = 'open';
let mdEditorOpen = false;
let rejectBoxOpen = false;
let reviewFilter = 'all'; // all | ok | edit | reroute | reject | none

const REVIEW_LABEL_MAP = {
  'кІҖнҶ мҷ„лЈҢ':   { key: 'ok',      text: 'вң… кІҖнҶ мҷ„лЈҢ',   cls: 'badge-review-ok' },
  'мҲҳм •н•„мҡ”':   { key: 'edit',    text: 'вңҸпёҸ мҲҳм •н•„мҡ”',   cls: 'badge-review-edit' },
  'л¶„лҘҳмһ¬кІҖнҶ ': { key: 'reroute', text: 'рҹ—Ӯ л¶„лҘҳмһ¬кІҖнҶ ', cls: 'badge-review-reroute' },
  'л°ҳл Өм¶”мІң':   { key: 'reject',  text: 'вқҢ л°ҳл Өм¶”мІң',   cls: 'badge-review-reject' },
};
const REVIEW_NONE = { key: 'none', text: 'рҹҶ• лҜёкІҖнҶ ', cls: 'badge-review-none' };

function reviewLabelOf(issue) {
  const labelNames = (issue.labels || []).map(l => typeof l === 'string' ? l : l.name);
  for (const name of ['кІҖнҶ мҷ„лЈҢ','мҲҳм •н•„мҡ”','л¶„лҘҳмһ¬кІҖнҶ ','л°ҳл Өм¶”мІң']) {
    if (labelNames.includes(name)) return REVIEW_LABEL_MAP[name];
  }
  return REVIEW_NONE;
}

// submit.htmlмқҖ кіөк°ң нҸјмқҙлқј лҲ„кө¬лӮҳ мһ„мқҳ н…ҚмҠӨнҠёлЎң мқҙмҠҲлҘј мғқм„ұн•  мҲҳ мһҲлӢӨ.
// title/bodyм—җм„ң м¶”м¶ңн•ң лӘЁл“  к°’мқҖ innerHTMLм—җ л„Јкё° м „ л°ҳл“ңмӢң мқҙмҠӨмјҖмқҙн”„.
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ліёл¬ёмҡ©: мқҙмҠӨмјҖмқҙн”„ нӣ„ \nл§Ң <br>лЎң ліөмӣҗ
function escapeHtmlMultiline(s) {
  return escapeHtml(s).replace(/\n/g, '<br>');
}

// мӮ¬мҡ©мһҗ мһ…л Ҙмқҙ л“Өм–ҙк°ҖлҠ” URLмқҖ javascript: л“ұ мң„н—ҳн•ң мҠӨнӮҙмқ„ м°ЁлӢЁ
function safeUrl(u) {
  if (!u) return '';
  const s = String(u).trim();
  if (/^https?:\/\//i.test(s)) return s;
  return '';
}

// в”Җв”Җв”Җ лЎңк·ёмқё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
document.getElementById('secret-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

const PER_PAGE = 100; // workerлҸ„ лҸҷмқј к°’ мӮ¬мҡ©
const MAX_PAGES = 10;  // 1000кұҙ мғҒн•ң

async function fetchAllIssues(state, secret) {
  const all = [];
  let lastPageFull = false;
  for (let page = 1; page <= MAX_PAGES; page++) {
    const res = await fetch(`${WORKER_URL}/admin/issues?state=${state}&page=${page}`, {
      headers: { 'X-Admin-Secret': secret }
    });
    if (!res.ok) {
      const err = new Error(`м„ңлІ„ мҳӨлҘҳ: ${res.status}`);
      err.status = res.status;
      throw err;
    }
    const data = await res.json();
    if (!Array.isArray(data)) {
      throw new Error(`мқ‘лӢө мҳӨлҘҳ: ${JSON.stringify(data)}`);
    }
    all.push(...data);
    lastPageFull = data.length === PER_PAGE;
    if (!lastPageFull) break;
  }
  // л§Ҳм§Җл§ү нҺҳмқҙм§Җк°Җ кҪү м°¬ мұ„лЎң мғҒн•ңм—җ лҸ„лӢ¬н–ҲлӢӨл©ҙ м¶”к°Җ мһҗлЈҢк°Җ мһҲмқ„ мҲҳ мһҲлӢӨлҠ” лң»
  if (lastPageFull) {
    console.warn(`admin.html: ${MAX_PAGES * PER_PAGE}кұҙ мғҒн•ң лҸ„лӢ¬ вҖ” м¶”к°Җ мһҗлЈҢк°Җ лҲ„лқҪлҗҗмқ„ мҲҳ мһҲмҠөлӢҲлӢӨ. MAX_PAGESлҘј лҠҳлҰ¬кұ°лӮҳ кІҖнҶ  м§„н–үмқ„ нҶөн•ҙ мІҳлҰ¬ мҷ„лЈҢ нғӯмңјлЎң мҳ®кІЁмЈјм„ёмҡ”.`);
    showStaleBanner(MAX_PAGES * PER_PAGE);
  } else {
    hideStaleBanner();
  }
  return all;
}

function showStaleBanner(limit) {
  let el = document.getElementById('pagination-warning');
  if (!el) {
    el = document.createElement('div');
    el.id = 'pagination-warning';
    el.style.cssText = 'background:#3a2e1a;color:#e0b85c;border:1px solid #5a4a2a;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px';
    const main = document.querySelector('.main');
    if (main) main.insertBefore(el, main.firstChild);
  }
  el.textContent = `вҡ  ${limit}кұҙ мғҒн•ң лҸ„лӢ¬ вҖ” м¶”к°Җ мһҗлЈҢк°Җ лҲ„лқҪлҗҗмқ„ мҲҳ мһҲмҠөлӢҲлӢӨ.`;
}

function hideStaleBanner() {
  const el = document.getElementById('pagination-warning');
  if (el) el.remove();
}

async function doLogin() {
  const secret = document.getElementById('secret-input').value.trim();
  if (!secret) return;
  const errEl = document.getElementById('login-err');
  errEl.textContent = 'нҷ•мқё мӨ‘...';

  try {
    const data = await fetchAllIssues('open', secret);
    adminSecret = secret;
    errEl.textContent = '';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    allIssues = data;
    renderIssues();
  } catch(e) {
    if (e.status === 401) errEl.textContent = 'л№„л°ҖлІҲнҳёк°Җ л§һм§Җ м•ҠмҠөлӢҲлӢӨ.';
    else errEl.textContent = e.message || `л„ӨнҠёмӣҢнҒ¬ мҳӨлҘҳ`;
  }
}

function doLogout() {
  adminSecret = '';
  allIssues = [];
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('secret-input').value = '';
  document.getElementById('login-err').textContent = '';
}

// в”Җв”Җв”Җ нғӯ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function switchTab(tab) {
  currentTab = tab === 'issues' ? 'open' : 'closed';
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (tab === 'issues' && i === 0) || (tab === 'closed' && i === 1));
  });
  loadIssues();
}

async function loadIssues() {
  document.getElementById('issue-list-area').innerHTML = '<div class="loading-msg">л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...</div>';
  try {
    allIssues = await fetchAllIssues(currentTab, adminSecret);
  } catch(e) {
    allIssues = [];
    document.getElementById('issue-list-area').innerHTML = `<div class="empty-msg">л¶Ҳлҹ¬мҳӨкё° мӢӨнҢЁ: ${escapeHtml(e.message)}</div>`;
    return;
  }
  renderIssues();
}

function setReviewFilter(key) {
  reviewFilter = key;
  renderIssues();
}

function renderIssues() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let filtered = q
    ? allIssues.filter(i => i.title.toLowerCase().includes(q) || (i.body || '').toLowerCase().includes(q))
    : allIssues;
  if (reviewFilter !== 'all') {
    filtered = filtered.filter(i => reviewLabelOf(i).key === reviewFilter);
  }
  renderIssueList(filtered);
}

function renderSummaryBar() {
  const counts = { ok: 0, edit: 0, reroute: 0, reject: 0, none: 0 };
  allIssues.forEach(i => counts[reviewLabelOf(i).key]++);
  const total = allIssues.length;
  const item = (key, label, n) =>
    `<span class="summary-item ${reviewFilter === key ? 'active' : ''}" onclick="setReviewFilter('${key}')">${label}<strong>${n}</strong></span>`;
  return `<div class="summary-bar">
    ${item('all', 'м „мІҙ ', total)}
    <span class="summary-divider">|</span>
    ${item('none',    'рҹҶ• лҜёкІҖнҶ  ',     counts.none)}
    ${item('ok',      'вң… кІҖнҶ мҷ„лЈҢ ',   counts.ok)}
    ${item('edit',    'вңҸпёҸ мҲҳм •н•„мҡ” ',   counts.edit)}
    ${item('reroute', 'рҹ—Ӯ л¶„лҘҳмһ¬кІҖнҶ  ', counts.reroute)}
    ${item('reject',  'вқҢ л°ҳл Өм¶”мІң ',   counts.reject)}
  </div>`;
}

function renderIssueList(issues) {
  const el = document.getElementById('issue-list-area');
  const summary = renderSummaryBar();
  if (!issues.length) {
    el.innerHTML = summary + '<div class="empty-msg">мЎ°кұҙм—җ л§һлҠ” мһҗлЈҢк°Җ м—ҶмҠөлӢҲлӢӨ.</div>';
    return;
  }
  el.innerHTML = summary + `<div class="issue-list">${issues.map(issue => {
    const region = extractSection(issue.body, 'кҙҖл Ё м§Җм—ӯ') || '';
    const type   = extractSection(issue.body, 'мһҗлЈҢ мў…лҘҳ') || '';
    const date   = extractSection(issue.body, 'мһҗлЈҢ м—°лҸ„') || '';
    const sub    = (issue.body || '').match(/^м ңм¶ңмһҗ: (.+)$/m)?.[1] || 'мқөлӘ…';
    const title  = issue.title.replace('[мһҗлЈҢ м ңм¶ң] ','');
    const stateBadge = issue.state === 'open'
      ? '<span class="badge badge-open">лҜёмІҳлҰ¬</span>'
      : '<span class="badge badge-closed">мҷ„лЈҢ</span>';
    const rev = reviewLabelOf(issue);
    const reviewBadge = `<span class="badge ${rev.cls}">${rev.text}</span>`;
    return `<div class="issue-card" onclick="openModal(${issue.number})">
      <div class="issue-num">#${issue.number}</div>
      <div class="issue-body">
        <div class="issue-title">${escapeHtml(title)}</div>
        <div class="issue-meta">
          ${stateBadge}
          ${reviewBadge}
          ${region ? `<span>рҹ“Қ ${escapeHtml(region)}</span>` : ''}
          ${type ? `<span>рҹ“„ ${escapeHtml(type)}</span>` : ''}
          ${date ? `<span>рҹ“… ${escapeHtml(date)}</span>` : ''}
          <span>рҹ‘Ө ${escapeHtml(sub)}</span>
          <span>${timeAgo(issue.created_at)}</span>
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// в”Җв”Җв”Җ лӘЁлӢ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function openModal(num) {

  currentIssue = issue;
  rejectBoxOpen = false;
  mdEditorOpen = false;

  const body = issue.body || '';
  document.getElementById('modal-title').textContent = issue.title.replace('[мһҗлЈҢ м ңм¶ң] ', '');

  // н•„л“ң нҢҢмӢұ
  const fields = [
    { label: 'мһҗлЈҢ мў…лҘҳ', key: 'мһҗлЈҢ мў…лҘҳ' },
    { label: 'м—°лҸ„', key: 'мһҗлЈҢ м—°лҸ„' },
    { label: 'кҙҖл Ё м§Җм—ӯ', key: 'кҙҖл Ё м§Җм—ӯ', full: true },
    { label: 'кҙҖл Ё мқёл¬јВ·мӮ¬кұҙ', key: 'кҙҖл Ё мқёл¬јВ·мӮ¬кұҙ', full: true },
    { label: 'м¶ңмІҳВ·мҶҢмһҘмІҳ', key: 'мһҗлЈҢ м¶ңмІҳВ·мҶҢмһҘмІҳ', full: true },
    { label: 'м„ӨлӘ…В·л©”лӘЁ', key: 'м„ӨлӘ…В·л©”лӘЁ', full: true },
  ];
  const submitter = body.match(/^м ңм¶ңмһҗ: (.+)$/m)?.[1] || 'мқөлӘ…';

  const rev = reviewLabelOf(issue);
  const issueUrl = safeUrl(issue.html_url);
  document.getElementById('modal-fields').innerHTML = `
    ${fields.map(f => {
      const val = extractSection(body, f.key) || '(м—ҶмқҢ)';
      return `<div class="field-item${f.full ? ' field-full' : ''}">
        <div class="field-label">${f.label}</div>
        <div class="field-value">${escapeHtmlMultiline(val)}</div>
      </div>`;
    }).join('')}
    <div class="field-item">
      <div class="field-label">м ңм¶ңмһҗ</div>
      <div class="field-value">${escapeHtml(submitter)}</div>
    </div>
    <div class="field-item">
      <div class="field-label">кІҖнҶ  мғҒнғң</div>
      <div class="field-value"><span class="badge ${rev.cls}">${rev.text}</span></div>
    </div>
    <div class="field-item field-full">
      <div class="field-label">GitHub мқҙмҠҲ (кІҖнҶ мһҗ мқҳкІ¬ лҢ“кёҖ нҷ•мқё)</div>
      <div class="field-value">${issueUrl
        ? `<a href="${escapeHtml(issueUrl)}" target="_blank" rel="noopener noreferrer" style="color:var(--blue)">#${issue.number} м—ҙкё° вҶ’</a>`
        : `#${issue.number} (л§ҒнҒ¬ м—ҶмқҢ)`}</div>
    </div>
  `;

  // мІЁл¶Җ нҢҢмқј нҢҢмӢұ (R2 URL нҸ¬н•Ё)
  const fileSection = extractSection(body, 'мІЁл¶Җ нҢҢмқј лӘ©лЎқ');
  const attachHtml = buildAttachments(fileSection);
  document.getElementById('modal-attachments').innerHTML = attachHtml
    ? `<h3>мІЁл¶Җ нҢҢмқј</h3><div class="attachment-grid">${attachHtml}</div>`
    : '';

  // OCR м…Җл үнҠёл°•мҠӨ мұ„мҡ°кё°
  populateOcrSelect(fileSection);
  ocrText = '';
  document.getElementById('ocr-result').style.display = 'none';
  document.getElementById('analysis-result').style.display = 'none';
  document.getElementById('ocr-result-label').style.display = 'none';
  document.getElementById('analysis-label').style.display = 'none';
  document.getElementById('ocr-loading').style.display = 'none';

  // кІҪлЎң мһҗлҸҷ м¶”мІң
  const region = extractSection(body, 'кҙҖл Ё м§Җм—ӯ') || '';
  const autoFolder = regionToFolder(region);
  const autoFilename = (issue.title.replace('[мһҗлЈҢ м ңм¶ң] ','').replace(/[\/\\:*?"<>|]/g,'_').slice(0,60)) + '.md';
  document.getElementById('field-folder').value = autoFolder;
  document.getElementById('field-filename').value = autoFilename;

  // md лҜёлҰ¬ліҙкё°

  document.getElementById('md-editor').value = buildAutoMd(issue);

  // кұ°л¶Җ мҙҲкё°нҷ”
  document.getElementById('reject-reason').style.display = 'none';
  document.getElementById('reject-confirm').style.display = 'none';
  document.getElementById('reject-reason').value = '';
  document.getElementById('action-result').textContent = '';
  document.getElementById('action-result').className = 'action-result';
  document.getElementById('btn-approve').disabled = false;
  document.getElementById('btn-reject').disabled = false;

  document.getElementById('modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function buildAttachments(fileSection) {
  if (!fileSection) return '';
  const lines = fileSection.split('\n').filter(l => l.trim().startsWith('-'));
  return lines.map(line => {
    // л§ҲнҒ¬лӢӨмҡҙ мқҙлҜём§Җ: - ![мқҙлҰ„](URL)
    const imgMatch = line.match(/!\[([^\]]*)\]\((https?:\/\/[^\)]+)\)/);
    if (imgMatch) {
      const url = safeUrl(imgMatch[2]);
      const alt = imgMatch[1];
      if (!url) return '';
      // openFullscreenмқҖ onclick мқёлқјмқём—җ URLмқ„ л°•м•„ л”°мҳҙн‘ң escape мң„н—ҳмқҙ мһҲм–ҙ
      // data мҶҚм„ұмңјлЎң м „лӢ¬н•ҳкі  мң„мһ„ н•ёл“Өлҹ¬лЎң мІҳлҰ¬
      return `<div class="attachment-item">
        <img src="${escapeHtml(url)}" alt="${escapeHtml(alt)}" data-fs="${escapeHtml(url)}" onclick="openFullscreen(this.dataset.fs)">
        <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(alt)}</a>
      </div>`;
    }
    // л§ҲнҒ¬лӢӨмҡҙ л§ҒнҒ¬: - [мқҙлҰ„](URL)
    const linkMatch = line.match(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/);
    if (linkMatch) {
      const url = safeUrl(linkMatch[2]);
      const name = linkMatch[1];
      if (!url) return '';
      const isPdf = url.toLowerCase().endsWith('.pdf') || name.toLowerCase().endsWith('.pdf');
      return `<div class="attachment-item">
        <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${isPdf ? 'рҹ“„' : 'рҹ“Һ'} ${escapeHtml(name)}</a>
      </div>`;
    }
    // мқјл°ҳ н…ҚмҠӨнҠё (кө¬лІ„м „ - нҢҢмқјлӘ…л§Ң)
    const text = line.replace(/^-\s*/, '');
    return `<div class="attachment-item"><span style="color:var(--muted);font-size:13px;">рҹ“Һ ${escapeHtml(text)}</span></div>`;
  }).join('');
}

async function doApprove() {
  if (!currentIssue) return;
  const folder   = document.getElementById('field-folder').value.trim();
  const filename = document.getElementById('field-filename').value.trim();
  if (!folder || !filename) { alert('нҸҙлҚ” кІҪлЎңмҷҖ нҢҢмқјлӘ…мқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”.'); return; }

  document.getElementById('btn-approve').disabled = true;
  document.getElementById('action-result').textContent = 'м•„м№ҙмқҙлёҢм—җ л°ҳмҳҒ мӨ‘...';
  document.getElementById('action-result').className = 'action-result';

  const md_override = mdEditorOpen ? document.getElementById('md-editor').value : undefined;

  const res = await fetch(`${WORKER_URL}/admin/approve`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': adminSecret },
    body: JSON.stringify({ issue_number: currentIssue.number, folder_override: folder, filename_override: filename, md_override }),
  });
  const data = await res.json();

  if (data.ok) {
    document.getElementById('action-result').className = 'action-result ok';
    const commitUrl = safeUrl(data.commit_url);
    document.getElementById('action-result').innerHTML =
      `вң… л°ҳмҳҒ мҷ„лЈҢ! <code>${escapeHtml(data.file_path)}</code>` +
      (commitUrl ? `<br><a href="${escapeHtml(commitUrl)}" target="_blank" rel="noopener noreferrer" style="color:var(--blue)">м»Өл°Ӣ ліҙкё° вҶ’</a>` : '');
    allIssues = allIssues.filter(i => i.number !== currentIssue.number);
  } else {
    document.getElementById('action-result').className = 'action-result err';
    document.getElementById('action-result').textContent = `вқҢ мҳӨлҘҳ: ${data.error}`;
    document.getElementById('btn-approve').disabled = false;
  }
}

// в”Җв”Җв”Җ мқјкҙ„ мҠ№мқё (нҳ„мһ¬ нҷ”л©ҙ н•„н„° кІ°кіј) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function bulkApproveFiltered() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let filtered = q
    ? allIssues.filter(i => i.title.toLowerCase().includes(q) || (i.body || '').toLowerCase().includes(q))
    : allIssues;
  if (reviewFilter !== 'all') {
    filtered = filtered.filter(i => reviewLabelOf(i).key === reviewFilter);
  }
  if (filtered.length === 0) { alert('мқјкҙ„ мҠ№мқён•  н•ӯлӘ©мқҙ м—ҶмҠөлӢҲлӢӨ.'); return; }

  const yes = confirm(`нҳ„мһ¬ н•„н„° кІ°кіј ${filtered.length}кұҙмқ„ мһҗлҸҷ кІҪлЎңлЎң мқјкҙ„ мҠ№мқён•©лӢҲлӢӨ.\n\n` +
                      `к°Ғ н•ӯлӘ©мқҖ мһҗлҸҷ нҸҙлҚ” + мһҗлҸҷ нҢҢмқјлӘ… + мһҗлҸҷ ліҖнҷҳ mdлЎң мІҳлҰ¬лҗ©лӢҲлӢӨ.\n` +
                      `(к°ңлі„ кІҖмҲҳк°Җ н•„мҡ”н•ҳл©ҙ м№ҙл“ң нҒҙлҰӯ вҶ’ лӘЁлӢ¬м—җм„ң мІҳлҰ¬н•ҳм„ёмҡ”.)\n\nкі„мҶҚн• к№Ңмҡ”?`);
  if (!yes) return;

  const box = document.getElementById('bulk-progress');
  box.style.display = 'block';
  box.style.color = 'var(--muted)';
  box.textContent = `м§„н–ү мӨ‘: 0/${filtered.length}`;

  let ok = 0, fail = 0;
  const failed = [];
  for (let i = 0; i < filtered.length; i++) {
    const issue = filtered[i];
    box.textContent = `м§„н–ү мӨ‘: ${i+1}/${filtered.length} (вң…${ok} / вқҢ${fail}) вҖ” #${issue.number} ${issue.title.slice(0, 50)}`;
    try {
      const res = await fetch(`${WORKER_URL}/admin/approve`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': adminSecret },
        body: JSON.stringify({ issue_number: issue.number }),  // override м—ҶмқҢ = worker мһҗлҸҷ кІҪлЎң/нҢҢмқјлӘ…/md
      });
      const data = await res.json();
      if (data.ok) {
        ok++;
        allIssues = allIssues.filter(x => x.number !== issue.number);
      } else {
        fail++;
        failed.push({ number: issue.number, title: issue.title, error: data.error });
      }
    } catch (e) {
      fail++;
      failed.push({ number: issue.number, title: issue.title, error: String(e) });
    }
    // GitHub API rate limit ліҙнҳё (мҙҲлӢ№ 1кұҙ нҺҳмқҙмҠӨ)
    if (i < filtered.length - 1) await new Promise(r => setTimeout(r, 800));
  }

  renderIssues();
  box.style.color = fail === 0 ? '#4ade80' : '#fbbf24';
  let msg = `мҷ„лЈҢ: вң…${ok} / вқҢ${fail} (мҙқ ${filtered.length})`;
  if (fail) {
    msg += '\nмӢӨнҢЁ н•ӯлӘ©:\n' + failed.slice(0, 5).map(f => `  #${f.number} вҖ” ${f.error}`).join('\n');
    if (failed.length > 5) msg += `\n  ... (${failed.length - 5}кұҙ лҚ”)`;
  }
  box.textContent = msg;
  box.style.whiteSpace = 'pre-wrap';
}

async function doReject() {
  if (!currentIssue) return;
  const reason = document.getElementById('reject-reason').value.trim();
  if (!reason) { alert('л°ҳл Ө мӮ¬мң лҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”.'); return; }

  document.getElementById('btn-reject').disabled = true;

  const res = await fetch(`${WORKER_URL}/admin/reject`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': adminSecret },
    body: JSON.stringify({ issue_number: currentIssue.number, reason }),
  });
  const data = await res.json();

  if (data.ok) {
    document.getElementById('action-result').className = 'action-result ok';
    document.getElementById('action-result').textContent = 'вҡ пёҸ л°ҳл Ө мІҳлҰ¬ мҷ„лЈҢ.';

    document.getElementById('action-result').className = 'action-result err';
    document.getElementById('action-result').textContent = `вқҢ мҳӨлҘҳ: ${data.error}`;
    document.getElementById('btn-reject').disabled = false;

}

// в”Җв”Җв”Җ OCR + л¶„м„қ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let ocrText = '';

function populateOcrSelect(fileSection) {
  const sel = document.getElementById('ocr-file-select');
  sel.innerHTML = '<option value="">вҖ” л¶„м„қн•  мқҙлҜём§Җ м„ нғқ вҖ”</option>';
  if (!fileSection) return;
  const lines = fileSection.split('\n').filter(l => l.trim().startsWith('-'));
  lines.forEach(line => {
    const imgMatch = line.match(/!\[([^\]]*)\]\((https?:\/\/[^\)]+)\)/);
    const linkMatch = line.match(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/);
    if (imgMatch) {
      const opt = document.createElement('option');
      opt.value = imgMatch[2];
      opt.textContent = imgMatch[1] || imgMatch[2].split('/').pop();
      sel.appendChild(opt);
    } else if (linkMatch && !linkMatch[2].endsWith('.pdf')) {
      const opt = document.createElement('option');
      opt.value = linkMatch[2];
      opt.textContent = linkMatch[1];
      sel.appendChild(opt);
    }
  });
}

async function doOcr() {
  const url = document.getElementById('ocr-file-select').value;
  if (!url) { alert('л¶„м„қн•  мқҙлҜём§ҖлҘј м„ нғқн•ҙмЈјм„ёмҡ”.'); return; }

  document.getElementById('btn-ocr').disabled = true;
  document.getElementById('ocr-loading').style.display = 'block';
  document.getElementById('ocr-result').style.display = 'none';
  document.getElementById('analysis-result').style.display = 'none';
  document.getElementById('ocr-result-label').style.display = 'none';
  document.getElementById('analysis-label').style.display = 'none';
  ocrText = '';

  try {
    const title = currentIssue?.title?.replace('[мһҗлЈҢ м ңм¶ң] ', '') || '';
    const res = await fetch(`${WORKER_URL}/admin/ocr`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': adminSecret },
      body: JSON.stringify({ image_url: url, title }),
    });
    const data = await res.json();
    document.getElementById('ocr-loading').style.display = 'none';

    if (data.ok) {
      if (data.text) {
        ocrText = data.text;
        document.getElementById('ocr-result-label').style.display = 'block';
        document.getElementById('ocr-result').textContent = data.text;
        document.getElementById('ocr-result').style.display = 'block';
      }
      if (data.analysis) {
        document.getElementById('analysis-label').style.display = 'block';
        document.getElementById('analysis-result').textContent = data.analysis;
        document.getElementById('analysis-result').style.display = 'block';
      }
      if (!data.text && !data.analysis && data.full) {
        document.getElementById('ocr-result-label').style.display = 'block';
        document.getElementById('ocr-result').textContent = data.full;
        document.getElementById('ocr-result').style.display = 'block';
      }
    } else {
      document.getElementById('ocr-result').textContent = data.error || 'л¶„м„қ мӢӨнҢЁ';
      document.getElementById('ocr-result').style.display = 'block';
    }
  } catch(e) {
    document.getElementById('ocr-loading').style.display = 'none';
    document.getElementById('ocr-result').textContent = `мҳӨлҘҳ: ${e.message}`;
    document.getElementById('ocr-result').style.display = 'block';
  }
  document.getElementById('btn-ocr').disabled = false;
}

// в”Җв”Җв”Җ мқҙлҜём§Җ м „мІҙнҷ”л©ҙ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

// в”Җв”Җв”Җ мң нӢё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// submit.htmlмқҙ мӮ¬мҡ©н•ҳлҠ” н‘ңмӨҖ 8к°ң м„№м…ҳ н—Өл”©л§Ң мў…лЈҢмһҗлЎң мқём •.
// мӮ¬мҡ©мһҗ мһ…л Ҙ noteм—җ л№„н‘ңмӨҖ ## н—Өл”©(мҳҲ: "## ліёл¬ё вҖ” н•ңмһҗ мӣҗл¬ё")мқҙ мһҲм–ҙлҸ„
// лӢӨмқҢ н‘ңмӨҖ м„№м…ҳмқ„ л§ҢлӮҳкё° м „к№Ңм§Җ ліёл¬ёмқҙ мһҳлҰ¬м§Җ м•ҠлҸ„лЎқ н•ңлӢӨ.
const STD_HEADINGS = [
  'мһҗлЈҢ м ңлӘ©', 'мһҗлЈҢ мў…лҘҳ', 'мһҗлЈҢ м—°лҸ„', 'кҙҖл Ё м§Җм—ӯ',
  'кҙҖл Ё мқёл¬јВ·мӮ¬кұҙ', 'мһҗлЈҢ м¶ңмІҳВ·мҶҢмһҘмІҳ', 'м„ӨлӘ…В·л©”лӘЁ', 'мІЁл¶Җ нҢҢмқј лӘ©лЎқ',
];
function _escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function extractSection(body, heading) {
  if (!body) return '';
  const enders = STD_HEADINGS.filter(h => h !== heading)
                              .map(h => `\\n## ${_escRe(h)}`).join('|');
  const re = new RegExp(`## ${_escRe(heading)}\\s*\\n([\\s\\S]*?)(?=${enders}|\\n---\\n|$)`, 'm');
  const m = body.match(re);
  return m ? m[1].trim() : '';
}

function regionToFolder(region) {
  if (region.includes('мҳҲмӮ°')) return '04-м§Җм—ӯ/м¶©лӮЁ/мҳҲмӮ°';
  if (region.includes('кіөмЈј')) return '04-м§Җм—ӯ/м¶©лӮЁ/кіөмЈј';
  if (region.includes('мІңм•Ҳ') || region.includes('м•„мӮ°')) return '04-м§Җм—ӯ/м¶©лӮЁ/мІңм•Ҳ';
  if (region.includes('м¶©лӮЁ')) return '04-м§Җм—ӯ/м¶©лӮЁ';
  if (region.includes('мІӯмЈј') || region.includes('м¶©л¶Ғ')) return '04-м§Җм—ӯ/м¶©л¶Ғ/мІӯмЈј';
  if (region.includes('м¶©л¶Ғ')) return '04-м§Җм—ӯ/м¶©л¶Ғ';
  if (region.includes('м„ңмҡё') || region.includes('кІҪм„ұ')) return '04-м§Җм—ӯ/м„ңмҡё';
  return '04-м§Җм—ӯ/лҜёл¶„лҘҳ';
}

// note(м„ӨлӘ…В·л©”лӘЁ) м•Ҳм—җм„ң ## ліёл¬ё вҖ” ... лӢӨмқҢ ``` ... ``` мҪ”л“ңлё”лЎқмқ„ м¶”м¶ң.
// мӢ л¬ёкё°мӮ¬ нғҖмһ…м—җм„ң н•ңмһҗ мӣҗл¬ё / н•ңкёҖ ліҖнҷҳ ліёл¬ёмқҙ мҪ”л“ңлё”лЎқмңјлЎң л“Өм–ҙмһҲлӢӨ.
function extractCodeBlockUnder(noteText, headingPattern) {
  if (!noteText) return '';
  const re = new RegExp(`## ${headingPattern}[^\\n]*\\n+\`\`\`\\n?([\\s\\S]*?)\\n?\`\`\``, 'm');
  const m = noteText.match(re);
  return m ? m[1].trim() : '';
}

// noteм—җм„ң л„ӨмқҙлІ„ мӣҗкё°мӮ¬ URL м¶”м¶ң.
function extractNaverUrl(noteText) {
  if (!noteText) return '';
  const m = noteText.match(/https:\/\/newslibrary\.naver\.com\/viewer\/[^\s\)\"<>]+/);
  return m ? m[0] : '';
}

// мқјл°ҳлӘ…мӮ¬(н•ҷмғқВ·көҗмӮ¬ л“ұ) вҖ” мқёл¬ј мҳӨмқёмӢқ л°©м§Җ
const NON_PERSON_WORDS = new Set([
  'н•ҷмғқ', 'көҗмӮ¬', 'кІҪм°°', 'мЈјлҜј', 'мІӯл…„', 'кҙҖкі„мһҗ', 'мқёмӮ¬', 'лҸҷм§Җ',
  'м—¬лҹ¬л¶„', 'н•ҷкөҗ', 'м§Ғмӣҗ', 'көҗмӣҗ', 'лӢ№көӯ', 'кҙҖмІӯ', 'лҸҷлҜј', 'мқјлҸҷ',
  'мҶҢл…„', 'мҶҢл…Җ', 'л¶Җмқё', 'лҶҚлҜј', 'л…ёлҸҷмһҗ', 'мӮ¬лһҢ', 'мӢңлҜј', 'кІҖмӮ¬', 'нҢҗмӮ¬',
  'к°„л¶Җ', 'нҡҢмӣҗ', 'лҢҖн‘ң', 'лӢЁмӣҗ', 'мқёмӣҗ', 'м „л¶Җ', 'мқјл¶Җ', 'лӘ…лӢЁ',
]);

// note ліёл¬ём—җм„ң н•ңкёҖ(н•ңмһҗ) нҢЁн„ҙмңјлЎң мқёл¬јлӘ… м¶”м¶ң
function extractInlinePersons(note) {
  const out = new Set();
  if (!note) return out;
  for (const m of note.matchAll(/([к°Җ-нһЈ]{2,5})\s*\([дёҖ-йҫҘ\s]{1,8}\)/g)) {
    if (!NON_PERSON_WORDS.has(m[1])) out.add(m[1]);
  }
  return out;
}

// note ліёл¬ём—җм„ң н•ҷкөҗлӘ… лӢӨмӨ‘ м¶”м¶ң
function extractSchools(text) {
  const out = new Set();
  if (!text) return out;
  for (const m of text.matchAll(/[к°Җ-нһЈ]{2,8}(?:кіөлҰҪ)?(?:ліҙнҶө|көӯлҜј|мҶҢ|мӨ‘|кі л“ұ|мғҒм—…|лҶҚм—…(?:ліҙмҠө)?|ліҙмҠө)?(?:н•ҷкөҗ|кі л“ұн•ҷкөҗ|кі ліҙ)/g)) {
    if (m[0].length >= 4) out.add(m[0]);
  }
  return out;
}

// мӮ¬кұҙВ·мҡҙлҸҷ нӮӨмӣҢл“ң м¶”м¶ң
function extractEvents(text) {
  const out = new Set();
  if (!text) return out;
  for (const m of text.matchAll(/(?:[к°Җ-нһЈ]{2,6}\s*)?(?:лҸҷл§№нңҙн•ҷ|л§№нңҙ|л§Ңм„ён•ӯмҹҒ|л§Ңм„ёмҡҙлҸҷ|мӢңмң„|кІ©л¬ё\s*мӮ¬кұҙ|н•ӯмҹҒ|мҡҙлҸҷ|мӮ¬кұҙ)/g)) {
    const e = m[0].trim();
    if (e.length >= 3 && e.length <= 14) out.add(e);
  }
  return out;
}

function buildAutoMd(issue) {
  const body = issue.body || '';
  const title   = extractSection(body, 'мһҗлЈҢ м ңлӘ©') || issue.title.replace('[мһҗлЈҢ м ңм¶ң] ','');
  const type    = extractSection(body, 'мһҗлЈҢ мў…лҘҳ');
  const date    = extractSection(body, 'мһҗлЈҢ м—°лҸ„');
  const region  = extractSection(body, 'кҙҖл Ё м§Җм—ӯ');
  const persons = extractSection(body, 'кҙҖл Ё мқёл¬јВ·мӮ¬кұҙ');
  const source  = extractSection(body, 'мһҗлЈҢ м¶ңмІҳВ·мҶҢмһҘмІҳ');
  const note    = extractSection(body, 'м„ӨлӘ…В·л©”лӘЁ');
  const files   = extractSection(body, 'мІЁл¶Җ нҢҢмқј лӘ©лЎқ');
  const sub     = (body.match(/^м ңм¶ңмһҗ: (.+)$/m) || [])[1] || '';

  // мӢ л¬ёкё°мӮ¬ нғҖмһ…: noteм—җ ## ліёл¬ё вҖ” н•ңмһҗ / ## ліёл¬ё вҖ” н•ңкёҖ ліҖнҷҳ мҪ”л“ңлё”лЎқмқҙ мһҲмқҢ.
  const isNewspaper = /мӢ л¬ё|кё°мӮ¬/.test(type) || /мӢ л¬ёкё°мӮ¬/.test(title);
  const hanjaText = isNewspaper ? extractCodeBlockUnder(note, 'ліёл¬ё\\s*[вҖ”-]+\\s*\\d{4}|ліёл¬ё\\s*[вҖ”-]+\\s*н•ңмһҗ|ліёл¬ё\\s*\\(?н•ңмһҗ') : '';
  const koreanText = isNewspaper ? extractCodeBlockUnder(note, 'ліёл¬ё\\s*[вҖ”-]+\\s*н•ңкёҖ|ліёл¬ё\\s*\\(?н•ңкёҖ') : '';
  const naverUrl = isNewspaper ? extractNaverUrl(note) : '';
  const issueImg = (note.match(/!\[[^\]]*\]\((https?:\/\/[^\)]+)\)/) || [])[1] || '';

  // мқёл¬јВ·н•ҷкөҗВ·мӮ¬кұҙ мһҗлҸҷ м¶”м¶ң (note ліёл¬ё + persons н•„л“ң)
  const personSet = extractInlinePersons(note);
  const schoolSet = extractSchools(note);
  const eventSet = extractEvents(`${title} ${note}`);
  // persons н•„л“ңлҸ„ кі л Ө
  if (persons && persons !== '(лҜёкё°мһ¬)') {
    persons.split(/[,пјҢгҖҒВ·\n]+/).map(s => s.trim()).filter(Boolean).forEach(t => {
      const k = t.replace(/\([^)]*\)/g, '').replace(/[дёҖ-йҫҘ]+/g, '').trim();
      if (!k || NON_PERSON_WORDS.has(k)) return;
      if (/(н•ҷкөҗ|кі ліҙ|кі л“ұн•ҷкөҗ|ліҙмҠө)/.test(k)) schoolSet.add(k);
      else if (/(мҡҙлҸҷ|н•ӯмҹҒ|мӢңмң„|л§№нңҙ|лҸҷл§№нңҙн•ҷ|мӮ¬кұҙ|кІ©л¬ё)/.test(k)) eventSet.add(k);
      else if (/^[к°Җ-нһЈ]{2,5}$/.test(k)) personSet.add(k);
    });
  }

  const lines = [
    `# ${title}`, ``,
    `## мһҗлЈҢ м •ліҙ`, ``,
    `- **мһҗлЈҢ мў…лҘҳ**: ${type || 'лҜёмғҒ'}`,
    `- **м—°лҸ„**: ${date || 'лҜёмғҒ'}`,
    `- **м§Җм—ӯ**: ${region || 'лҜёмғҒ'}`,
    `- **м¶ңмІҳ**: ${source || 'лҜёкё°мһ¬'}`,
  ];
  if (naverUrl) lines.push(`- **мӣҗкё°мӮ¬**: [л„ӨмқҙлІ„ лүҙмҠӨлқјмқҙлёҢлҹ¬лҰ¬](${naverUrl})`);
  lines.push(`- **м ңм¶ңмһҗ**: ${sub}`);
  lines.push(`- **мӣҗліё мқҙмҠҲ**: [#${issue.number}](${issue.html_url})`);
  lines.push(``);

  if (issueImg) {
    lines.push(`## кё°мӮ¬ мқҙлҜём§Җ`, ``, `![${title}](${issueImg})`, ``);
  }

  if (hanjaText) {
    lines.push(`## ліёл¬ё вҖ” мӣҗл¬ё (н•ңмһҗ)`, ``, '```', hanjaText, '```', ``);
  }
  if (koreanText) {
    lines.push(`## ліёл¬ё вҖ” н•ңкёҖ ліҖнҷҳ (л„ӨмқҙлІ„ OCR)`, ``, '```', koreanText, '```', ``);
  }
  if (!hanjaText && !koreanText) {
    lines.push(`## м„ӨлӘ…В·л©”лӘЁ`, ``, note || '(м—ҶмқҢ)', ``);
  }

  // мҳөмӢңл””м–ё к·ёлһҳн”„ л…ёл“ң мғқм„ұмқ„ мң„н•ң [[wikilink]] м„№м…ҳ
  if (personSet.size) {
    lines.push(`## кҙҖл Ё мқёл¬ј`, ``);
    [...personSet].forEach(p => lines.push(`- [[${p}]]`));
    lines.push(``);
  }
  if (schoolSet.size) {
    lines.push(`## кҙҖл Ё н•ҷкөҗ`, ``);
    [...schoolSet].forEach(s => lines.push(`- [[${s}]]`));
    lines.push(``);
  }
  if (eventSet.size) {
    lines.push(`## кҙҖл Ё мӮ¬кұҙ`, ``);
    [...eventSet].forEach(e => lines.push(`- [[${e}]]`));
    lines.push(``);
  }
  // м§Җм—ӯ л°ұл§ҒнҒ¬
  const regionMatch = region && region.match(/([к°Җ-нһЈ]{2,3}(?:мӢң|кө°|кө¬|лҸ„))/);
  if (regionMatch) {
    lines.push(`## кҙҖл Ё м§Җм—ӯ`, ``, `- [[${regionMatch[1]}]]`, ``);
  }

  lines.push(`## мІЁл¶Җ нҢҢмқј`, ``, files || '(м—ҶмқҢ)');
  return lines.join('\n');
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const d = Math.floor(diff / 86400000);
  if (d === 0) return 'мҳӨлҠҳ';
  if (d === 1) return 'м–ҙм ң';
  if (d < 30) return `${d}мқј м „`;
  return new Date(iso).toLocaleDateString('ko-KR');
}
