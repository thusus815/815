<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>815 독립운동 아카이브 — 지식 그래프</title>
<script src="https://cdn.jsdelivr.net/npm/graphology@0.25.4/dist/graphology.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/graphology-library@0.7.1/dist/graphology-library.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sigma@3/dist/sigma.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d1117; color:#e6edf3; font-family:'Noto Sans KR',sans-serif; overflow:hidden; }

  #container { width:100vw; height:100vh; }

  #panel {
    position:fixed; top:0; left:0; width:280px; height:100vh;
    background:rgba(13,17,23,0.92); backdrop-filter:blur(12px);
    border-right:1px solid #30363d; padding:16px; overflow-y:auto;
    z-index:10; display:flex; flex-direction:column; gap:12px;
  }

  #panel h1 { font-size:14px; font-weight:700; color:#58a6ff; border-bottom:1px solid #30363d; padding-bottom:8px; }

  #search {
    width:100%; padding:8px 10px; border-radius:6px;
    border:1px solid #30363d; background:#161b22; color:#e6edf3;
    font-size:13px; outline:none;
  }
  #search:focus { border-color:#58a6ff; }

  .legend { display:flex; flex-direction:column; gap:6px; }
  .legend-item { display:flex; align-items:center; gap:8px; font-size:12px; cursor:pointer; padding:4px; border-radius:4px; }
  .legend-item:hover { background:#161b22; }
  .legend-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }

  #info {
    background:#161b22; border:1px solid #30363d; border-radius:8px;
    padding:12px; font-size:12px; line-height:1.6; display:none;
  }
  #info h3 { font-size:13px; color:#58a6ff; margin-bottom:6px; }
  #info a { color:#79c0ff; text-decoration:none; }
  #info a:hover { text-decoration:underline; }

  .stats { font-size:11px; color:#8b949e; display:flex; gap:12px; }

  #focus-bar {
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    background:rgba(13,17,23,0.95); border:1px solid #58a6ff; border-radius:8px;
    padding:10px 16px; display:none; gap:10px; align-items:center; z-index:15;
    backdrop-filter:blur(8px); font-size:13px;
  }
  #focus-bar.active { display:flex; }
  #focus-bar .focus-label { color:#58a6ff; font-weight:600; }
  #focus-bar .focus-stats { color:#8b949e; font-size:11px; }
  #focus-bar button {
    background:#21262d; border:1px solid #30363d; color:#e6edf3;
    padding:4px 10px; border-radius:4px; cursor:pointer; font-size:12px;
  }
  #focus-bar button:hover { border-color:#58a6ff; }
  #focus-bar button.exit { background:#3a1d1d; border-color:#f85149; color:#f85149; }

  #controls {
    position:fixed; bottom:16px; right:16px; display:flex; gap:8px; z-index:10;
  }
  .btn {
    background:rgba(13,17,23,0.9); border:1px solid #30363d;
    color:#e6edf3; padding:8px 14px; border-radius:6px; cursor:pointer;
    font-size:12px; backdrop-filter:blur(8px);
  }
  .btn:hover { background:#161b22; border-color:#58a6ff; }

  #loading {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    text-align:center; z-index:20;
  }
  .spinner {
    width:40px; height:40px; border:3px solid #30363d;
    border-top-color:#58a6ff; border-radius:50%;
    animation:spin 0.8s linear infinite; margin:0 auto 12px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  #filter-section { display:flex; flex-direction:column; gap:4px; }
  #filter-section label { font-size:11px; color:#8b949e; }

  .tag-filter {
    padding:4px 8px; border-radius:4px; border:1px solid #30363d;
    background:#0d1117; color:#e6edf3; font-size:11px; cursor:pointer;
    text-align:left; width:100%;
  }
  .tag-filter.active { border-color:#58a6ff; background:#161b22; }
  .tag-filter:hover { background:#161b22; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div style="color:#8b949e;font-size:13px;">그래프 로딩 중...</div>
</div>

<div id="focus-bar">
  <span class="focus-label" id="focus-label">—</span>
  <span class="focus-stats" id="focus-stats">—</span>
  <button id="btn-expand">＋ 1단계 확장</button>
  <button id="btn-shrink">－ 축소</button>
  <button id="btn-exit-focus" class="exit">✕ 전체 보기</button>
</div>

<div id="panel">
  <h1>815 독립운동 아카이브</h1>

  <input id="search" type="text" placeholder="인물·사건·지역 검색..." />

  <div class="stats">
    <span id="stat-nodes">-</span>
    <span id="stat-edges">-</span>
  </div>

  <div class="legend">
    <div style="font-size:11px;color:#8b949e;">노드 분류</div>
    <div class="legend-item" data-filter="친일인물">
      <div class="legend-dot" style="background:#FF6B35"></div> 친일 인물
    </div>
    <div class="legend-item" data-filter="항일">
      <div class="legend-dot" style="background:#4A90D9"></div> 항일 인물
    </div>
    <div class="legend-item" data-filter="사건">
      <div class="legend-dot" style="background:#7BC67E"></div> 사건
    </div>
    <div class="legend-item" data-filter="단체">
      <div class="legend-dot" style="background:#B07CC6"></div> 단체
    </div>
    <div class="legend-item" data-filter="지역">
      <div class="legend-dot" style="background:#F5C842"></div> 지역
    </div>
    <div class="legend-item" data-filter="학교">
      <div class="legend-dot" style="background:#E57373"></div> 학교
    </div>
        <div class="legend-item" data-filter="all" style="margin-top:4px;">
          <div class="legend-dot" style="background:#888"></div> 전체 보기
        </div>
      </div>

      <div style="font-size:11px;color:#8b949e;margin-top:8px;border-top:1px solid #30363d;padding-top:8px;">엣지 분류</div>
      <div class="legend">
        <div class="legend-item" style="cursor:default">
          <div style="width:24px;height:2px;background:#FFD700"></div>
          <span>양방향 상호참조 <span style="color:#8b949e">(강한 관계)</span></span>
        </div>
        <div class="legend-item" style="cursor:default">
          <div style="width:24px;height:2px;background:#7BC67E"></div>
          <span>인물 ↔ 사건</span>
        </div>
        <div class="legend-item" style="cursor:default">
          <div style="width:24px;height:2px;background:#B07CC6"></div>
          <span>인물 ↔ 단체</span>
        </div>
        <div class="legend-item" style="cursor:default">
          <div style="width:24px;height:2px;background:#F5C842"></div>
          <span>인물 ↔ 지역</span>
        </div>
        <div class="legend-item" style="cursor:default">
          <div style="width:24px;height:2px;background:#FF4444"></div>
          <span>친일 ↔ 항일 <span style="color:#8b949e">(대립)</span></span>
        </div>
        <div class="legend-item" style="cursor:default">
          <div style="width:24px;height:2px;background:#3a4452"></div>
          <span>일반 단방향</span>
        </div>
      </div>

      <div id="info"></div>
</div>

<div id="container"></div>

<div id="controls">
  <button class="btn" id="btn-reset">🔄 초기화</button>
  <button class="btn" id="btn-layout">⚡ 레이아웃 재계산</button>
  <a href="/" class="btn">← 아카이브로</a>
</div>

<script>
const BASE = location.origin + location.pathname.replace(/\/graph\.html$/, '');
const GRAPH_JSON = BASE + '/graph_data.json';

const COLOR_MAP = {
  "친일인물": "#FF6B35",
  "항일":     "#4A90D9",
  "사건":     "#7BC67E",
  "단체":     "#B07CC6",
  "지역":     "#F5C842",
  "학교":     "#E57373",
  "문헌":     "#90A4AE",
  "인덱스":   "#FFFFFF",
};

let sigmaInstance = null;
let graph = null;
let activeFilter = null;
let focusMode = false;        // 부분 그래프 모드 활성 여부
let focusCenter = null;       // 중심 노드 ID
let focusDepth = 1;           // 현재 보여주는 이웃 깊이
let visibleNodes = new Set(); // 현재 보이는 노드 집합

async function init() {
  const res  = await fetch(GRAPH_JSON);
  const data = await res.json();

  document.getElementById('stat-nodes').textContent = `노드 ${data.nodes.length}`;
  document.getElementById('stat-edges').textContent = `엣지 ${data.edges.length}`;

  graph = new graphology.Graph({ multi: false });

  // 노드 추가 (랜덤 초기 위치)
  data.nodes.forEach(n => {
    graph.addNode(n.id, {
      label: n.label,
      color: n.color || '#888',
      size:  n.size  || 3,
      x: Math.random() * 1000 - 500,
      y: Math.random() * 1000 - 500,
      tags: n.tags || [],
      origColor: n.color || '#888',
    });
  });

  // 엣지 추가 — 방향성/가중치/관계타입 메타 보존
  let mutualEdges = 0, fwdEdges = 0;
  data.edges.forEach(e => {
    try {
      if (graph.hasNode(e.source) && graph.hasNode(e.target) && !graph.hasEdge(e.source, e.target)) {
        graph.addEdge(e.source, e.target, {
          size: e.size || 0.5,
          color: e.color || '#30363d',
          origColor: e.color || '#30363d',
          weight: e.weight || 1,
          direction: e.direction || 'forward',
          relType: e.relType || '',
          type: e.type || 'line',
        });
        if (e.direction === 'mutual') mutualEdges++; else fwdEdges++;
      }
    } catch(_) {}
  });

  document.getElementById('stat-edges').textContent =
    `엣지 ${data.edges.length} (양방향 ${mutualEdges})`;

  // Sigma 렌더링 — reducer로 hidden 처리
  sigmaInstance = new Sigma(graph, document.getElementById('container'), {
    renderEdgeLabels: false,
    defaultEdgeColor: '#30363d',
    defaultNodeColor: '#888',
    labelColor: { color: '#e6edf3' },
    labelSize: 10,
    labelWeight: '400',
    minCameraRatio: 0.05,
    maxCameraRatio: 20,
    nodeReducer: (node, data) => {
      if (focusMode && !visibleNodes.has(node)) return { ...data, hidden: true };
      return data;
    },
    edgeReducer: (edge, data) => {
      const [s, t] = graph.extremities(edge);
      if (focusMode && (!visibleNodes.has(s) || !visibleNodes.has(t))) {
        return { ...data, hidden: true };
      }
      return data;
    },
  });

  // UI 먼저 보여주고 레이아웃은 다음 틱에 (블로킹 방지)
  document.getElementById('loading').querySelector('div:last-child').textContent =
    '레이아웃 계산 중... (5~10초)';
  setTimeout(() => {
    runLayout();
    document.getElementById('loading').style.display = 'none';
  }, 50);

  // 클릭 → 부분 그래프 모드 진입
  sigmaInstance.on('clickNode', ({ node }) => {
    const attrs = graph.getNodeAttributes(node);
    showInfo(node, attrs);
    enterFocus(node, 1);
  });

  // 빈 곳 클릭 시는 정보 패널만 닫음 (그래프는 유지)
  sigmaInstance.on('clickStage', () => {
    document.getElementById('info').style.display = 'none';
  });
}

function runLayout() {
  // graphology-library에 포함된 ForceAtlas2 정적 레이아웃 사용
  const fa2 = graphologyLibrary.layoutForceAtlas2;
  if (!fa2 || typeof fa2.assign !== 'function') {
    console.warn('layoutForceAtlas2를 찾을 수 없습니다. 랜덤 위치 유지.');
    return;
  }

  // 1700+ 노드 → 적당한 반복 횟수
  const settings = fa2.inferSettings ? fa2.inferSettings(graph) : {};
  fa2.assign(graph, {
    iterations: 200,
    settings: {
      ...settings,
      gravity: 1,
      scalingRatio: 8,
      strongGravityMode: false,
      barnesHutOptimize: true,
      slowDown: 5,
    }
  });

  if (sigmaInstance) sigmaInstance.refresh();
}

// N단계 이웃까지 BFS로 수집
function neighborsWithin(centerNode, depth) {
  const result = new Set([centerNode]);
  let frontier = new Set([centerNode]);
  for (let d = 0; d < depth; d++) {
    const next = new Set();
    frontier.forEach(n => {
      graph.neighbors(n).forEach(nb => {
        if (!result.has(nb)) { result.add(nb); next.add(nb); }
      });
    });
    frontier = next;
    if (frontier.size === 0) break;
  }
  return result;
}

// 부분 그래프 모드 진입
function enterFocus(node, depth) {
  focusMode = true;
  focusCenter = node;
  focusDepth = depth;
  visibleNodes = neighborsWithin(node, depth);

  const label = graph.getNodeAttribute(node, 'label');
  document.getElementById('focus-label').textContent = `🎯 ${label}`;
  document.getElementById('focus-stats').textContent =
    `${depth}단계 이웃 · ${visibleNodes.size}개 노드`;
  document.getElementById('focus-bar').classList.add('active');

  // 색상 초기화 (강조 모드 잔재 제거)
  resetColors();
  sigmaInstance.refresh();

  // 카메라를 중심 노드로 부드럽게 이동
  const centerAttrs = graph.getNodeAttributes(node);
  sigmaInstance.getCamera().animate(
    { x: centerAttrs.x, y: centerAttrs.y, ratio: 0.4 },
    { duration: 600 }
  );
}

// 부분 그래프 모드 해제
function exitFocus() {
  focusMode = false;
  focusCenter = null;
  visibleNodes.clear();
  document.getElementById('focus-bar').classList.remove('active');
  resetColors();
  sigmaInstance.refresh();
  sigmaInstance.getCamera().animatedReset();
}

function expandFocus() {
  if (!focusMode || !focusCenter) return;
  if (focusDepth >= 5) return;
  enterFocus(focusCenter, focusDepth + 1);
}

function shrinkFocus() {
  if (!focusMode || !focusCenter) return;
  if (focusDepth <= 1) { exitFocus(); return; }
  enterFocus(focusCenter, focusDepth - 1);
}

function resetColors() {
  graph.forEachNode((n, attrs) => {
    graph.setNodeAttribute(n, 'color', attrs.origColor);
  });
  graph.forEachEdge((e, attrs) => {
    graph.setEdgeAttribute(e, 'color', attrs.origColor || '#30363d');
  });
}

function showInfo(nodeId, attrs) {
  const panel = document.getElementById('info');
  const slug = nodeId;
  const url  = '/' + slug;

  // 엣지 통계 계산
  let mutual = 0, oneway = 0, oppositeRel = 0;
  const relCounts = {};
  graph.forEachEdge(nodeId, (e, eAttrs, src, tgt) => {
    if (eAttrs.direction === 'mutual') mutual++; else oneway++;
    if (eAttrs.relType && eAttrs.relType.includes('친일인물') && eAttrs.relType.includes('항일인물')) {
      oppositeRel++;
    }
    relCounts[eAttrs.relType] = (relCounts[eAttrs.relType] || 0) + 1;
  });

  const topRels = Object.entries(relCounts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 3)
    .map(([k, v]) => `${k} (${v})`)
    .join(', ');

  panel.style.display = 'block';
  panel.innerHTML = `
    <h3>${attrs.label}</h3>
    <div style="color:#8b949e;margin-bottom:6px;">
      총 연결: <b style="color:#e6edf3">${graph.degree(nodeId)}</b>개
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px;font-size:11px;">
      <span style="color:#FFD700">🟡 양방향 ${mutual}</span>
      <span style="color:#8b949e">⬜ 단방향 ${oneway}</span>
      ${oppositeRel ? `<span style="color:#FF4444">⚔ 대립 ${oppositeRel}</span>` : ''}
    </div>
    ${topRels ? `<div style="font-size:10px;color:#8b949e;margin-bottom:8px;">주요 관계: ${topRels}</div>` : ''}
    ${attrs.tags.length ? `<div style="margin-bottom:8px;">${attrs.tags.slice(0,5).map(t => `<span style="background:#21262d;padding:2px 6px;border-radius:4px;font-size:10px;margin-right:4px;">${t}</span>`).join('')}</div>` : ''}
    <a href="${url}" target="_blank">→ 노트 열기</a>
  `;
}

// 검색 — 엔터 또는 정확 매칭 1개면 부분 그래프 모드로 진입
let searchTimer = null;
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase().trim();
  clearTimeout(searchTimer);

  if (!q) {
    if (focusMode) exitFocus();
    return;
  }

  // 디바운스: 입력 멈춘 후 350ms 뒤에 적용
  searchTimer = setTimeout(() => {
    const matched = [];
    graph.forEachNode((n, attrs) => {
      if (attrs.label.toLowerCase().includes(q)) matched.push(n);
    });

    if (matched.length === 0) return;

    if (matched.length === 1) {
      // 정확히 1개 → 부분 그래프 모드
      const node = matched[0];
      enterFocus(node, 1);
      showInfo(node, graph.getNodeAttributes(node));
    } else if (matched.length <= 5) {
      // 2~5개 → 모두 표시 + 각자의 이웃까지
      const all = new Set();
      matched.forEach(n => neighborsWithin(n, 1).forEach(x => all.add(x)));
      focusMode = true;
      focusCenter = matched[0];
      focusDepth = 1;
      visibleNodes = all;
      document.getElementById('focus-label').textContent = `🔍 "${q}" 매칭 ${matched.length}개`;
      document.getElementById('focus-stats').textContent = `이웃 포함 ${all.size}개 노드`;
      document.getElementById('focus-bar').classList.add('active');
      sigmaInstance.refresh();
    } else {
      // 6개 이상 → 매칭만 강조 (전체 그래프 유지)
      if (focusMode) exitFocus();
      const set = new Set(matched);
      graph.forEachNode((n, attrs) => {
        graph.setNodeAttribute(n, 'color', set.has(n) ? attrs.origColor : '#1c2128');
      });
    }
  }, 350);
});

// 범례 필터 — 카테고리 부분 그래프 모드
document.querySelectorAll('.legend-item').forEach(el => {
  el.addEventListener('click', () => {
    const f = el.dataset.filter;
    if (f === 'all') { exitFocus(); activeFilter = null; return; }

    activeFilter = f;
    const colorMatch = COLOR_MAP[f];
    const matched = new Set();
    graph.forEachNode((n, attrs) => {
      const match = attrs.origColor === colorMatch ||
                    (attrs.tags || []).some(t => t.includes(f));
      if (match) matched.add(n);
    });

    if (matched.size === 0) return;

    focusMode = true;
    focusCenter = null;
    visibleNodes = matched;
    document.getElementById('focus-label').textContent = `🏷️ ${f}`;
    document.getElementById('focus-stats').textContent = `${matched.size}개 노드`;
    document.getElementById('focus-bar').classList.add('active');
    resetColors();
    sigmaInstance.refresh();
  });
});

// 부분 그래프 모드 컨트롤
document.getElementById('btn-expand').addEventListener('click', expandFocus);
document.getElementById('btn-shrink').addEventListener('click', shrinkFocus);
document.getElementById('btn-exit-focus').addEventListener('click', exitFocus);

// 리셋 버튼
document.getElementById('btn-reset').addEventListener('click', () => {
  exitFocus();
  document.getElementById('info').style.display = 'none';
  document.getElementById('search').value = '';
});

// 레이아웃 재계산
document.getElementById('btn-layout').addEventListener('click', runLayout);

init().catch(err => {
  document.getElementById('loading').innerHTML =
    `<div style="color:#f85149">그래프 로딩 실패: ${err.message}</div>`;
});
</script>
</body>
</html>
