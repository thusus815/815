<script>
const BASE = location.origin + location.pathname.replace(/\/graph\.html$/, '');
const GRAPH_JSON = BASE + '/graph_data.json';
const GRAPH_GEXF = BASE + '/graph.gexf';
let usedGexf = false;

const COLOR_MAP = {
  "친일인물": "#FF6B35",
  "항일":     "#4A90D9",
  "사건":     "#7BC67E",
  "단체":     "#B07CC6",
  "지역":     "#F5C842",
  "학교":     "#E57373",
  "문헌":     "#90A4AE",
  "인덱스":   "#FFFFFF",
};

let sigmaInstance = null;
let graph = null;
let activeFilter = null;
let focusMode = false;        // 부분 그래프 모드 활성 여부
let focusCenter = null;       // 중심 노드 ID
let focusDepth = 1;           // 현재 보여주는 이웃 깊이
let visibleNodes = new Set(); // 현재 보이는 노드 집합

async function tryLoadGexf() {
  try {
    const res = await fetch(GRAPH_GEXF, { cache: 'no-store' });
    if (!res.ok) return null;
    const xml = await res.text();
    if (!xml.includes('<gexf')) return null;
    const parser = (window.graphologyGexf && window.graphologyGexf.parse)
                || (window.gexf && window.gexf.parse)
                || (window.graphologyLibrary && window.graphologyLibrary.gexf && window.graphologyLibrary.gexf.parse);
    if (!parser) {
      console.warn('GEXF 파서를 찾을 수 없음');
      return null;
    }
    const g = parser(graphology.Graph, xml);
    // 좌표/필수 속성 가드: 일부 노드가 x/y 누락된 경우 랜덤 좌표로 복구
    let fixed = 0;
    g.forEachNode((n, attrs) => {
      if (!Number.isFinite(attrs.x) || !Number.isFinite(attrs.y)) {
        g.setNodeAttribute(n, 'x', (Math.random() - 0.5) * 2000);
        g.setNodeAttribute(n, 'y', (Math.random() - 0.5) * 2000);
        fixed++;
      }
      if (!Number.isFinite(attrs.size)) g.setNodeAttribute(n, 'size', 5);
      if (!attrs.color) g.setNodeAttribute(n, 'color', '#888');
      if (!attrs.label) g.setNodeAttribute(n, 'label', String(n));
      g.setNodeAttribute(n, 'origColor', g.getNodeAttribute(n, 'color'));
    });
    g.forEachEdge((e, attrs) => {
      if (!Number.isFinite(attrs.size)) g.setEdgeAttribute(e, 'size', 0.5);
      if (!attrs.color) g.setEdgeAttribute(e, 'color', '#30363d');
      g.setEdgeAttribute(e, 'origColor', g.getEdgeAttribute(e, 'color'));
    });
    if (fixed > 0) console.warn(`GEXF: ${fixed}개 노드 좌표 누락, 랜덤 복구`);
    return g;
  } catch (e) {
    console.warn('GEXF 로드 실패, JSON으로 폴백:', e.message);
    return null;
  }
}

async function loadFromJson() {
  const res = await fetch(GRAPH_JSON);
  const data = await res.json();
  const g = new graphology.Graph({ multi: false });

  data.nodes.forEach(n => {
    g.addNode(n.id, {
      label: n.label,
      color: n.color || '#888',
      size:  n.size  || 3,
      x: Math.random() * 1000 - 500,
      y: Math.random() * 1000 - 500,
      tags: n.tags || [],
      origColor: n.color || '#888',
    });
  });

  let mutualEdges = 0;
  data.edges.forEach(e => {
    try {
      if (g.hasNode(e.source) && g.hasNode(e.target) && !g.hasEdge(e.source, e.target)) {
        g.addEdge(e.source, e.target, {
          size: e.size || 0.5,
          color: e.color || '#30363d',
          origColor: e.color || '#30363d',
          weight: e.weight || 1,
          direction: e.direction || 'forward',
          relType: e.relType || '',
        });
        if (e.direction === 'mutual') mutualEdges++;
      }
    } catch(_) {}
  });
  g._mutualEdges = mutualEdges;
  return g;
}

async function init() {
  // GEXF(Gephi 디자인 결과) 우선, 실패 시 JSON 폴백
  graph = await tryLoadGexf();
  if (graph) {
    usedGexf = true;
    console.log('GEXF 로드됨 — Gephi 디자인 사용');
    // GEXF의 viz:color/size를 origColor/size 속성으로 정규화
    let mutualEdges = 0;
    graph.forEachNode((n, attrs) => {
      const c = attrs.color || '#888';
      graph.setNodeAttribute(n, 'origColor', c);
      if (!attrs.tags) graph.setNodeAttribute(n, 'tags', []);
    });
    graph.forEachEdge((e, attrs) => {
      const c = attrs.color || '#30363d';
      graph.setEdgeAttribute(e, 'origColor', c);
      if (attrs.direction === 'mutual') mutualEdges++;
    });
    graph._mutualEdges = mutualEdges;
  } else {
    console.log('JSON 로드 (Gephi 미적용 상태)');
    graph = await loadFromJson();
  }

  document.getElementById('stat-nodes').textContent = `노드 ${graph.order}`;
  document.getElementById('stat-edges').textContent =
    `엣지 ${graph.size} (양방향 ${graph._mutualEdges || 0})`;

  // 가독성: degree 기반 핵심 노드 선별
  const degreeRank = [];
  graph.forEachNode(n => degreeRank.push([n, graph.degree(n)]));
  degreeRank.sort((a, b) => b[1] - a[1]);

  // GEXF는 이미 디자인됐으므로 더 관대하게, JSON 폴백은 빡빡하게
  const TOP_NODES  = usedGexf ? 1724 : 120;
  const TOP_LABELS = usedGexf ? 400 : 80;
  const importantNodes = new Set(degreeRank.slice(0, TOP_NODES).map(x => x[0]));
  const labeledNodes   = new Set(degreeRank.slice(0, TOP_LABELS).map(x => x[0]));
  graph.forEachNode((n, attrs) => {
    graph.setNodeAttribute(n, 'isImportant', importantNodes.has(n));
    graph.setNodeAttribute(n, 'isLabeled', labeledNodes.has(n));
  });

  // Sigma 렌더링 — reducer로 동적 가독성 + 부분그래프 모드
  sigmaInstance = new Sigma(graph, document.getElementById('container'), {
    renderEdgeLabels: false,
    defaultEdgeColor: '#30363d',
    defaultNodeColor: '#888',
    labelColor: { color: '#e6edf3' },
    labelSize: 12,
    labelWeight: '600',
    labelDensity: 1.2,
    labelGridCellSize: 55,
    labelRenderedSizeThreshold: 2,
    minCameraRatio: 0.02,
    maxCameraRatio: 30,
    enableEdgeEvents: false,
    allowInvalidContainer: true,
    nodeReducer: (node, data) => {
      const hovered = window.__getHovered && window.__getHovered();
      // 부분그래프 모드 우선
      if (focusMode) {
        if (!visibleNodes.has(node)) return { ...data, hidden: true };
        return data;
      }
      // hover 시: hover 노드 + 직접 이웃은 라벨 강제 표시·확대
      if (hovered) {
        if (node === hovered) {
          return { ...data, zIndex: 10, size: (data.size || 3) * 1.8, color: '#58a6ff' };
        }
        if (graph.areNeighbors(hovered, node)) {
          return { ...data, zIndex: 5, label: data.label || String(node), size: (data.size || 3) * 1.2 };
        }
      }
      if (!data.isImportant) return { ...data, hidden: true };
      if (!data.isLabeled)   return { ...data, label: '' };
      return data;
    },
    edgeReducer: (edge, data) => {
      const [s, t] = graph.extremities(edge);
      const hovered = window.__getHovered && window.__getHovered();
      if (focusMode) {
        if (!visibleNodes.has(s) || !visibleNodes.has(t)) return { ...data, hidden: true };
        return data;
      }
      // hover 시: hover 노드에 닿는 엣지만 두껍게(본래 의미 색 유지), 나머지는 숨김
      if (hovered) {
        if (s === hovered || t === hovered) {
          return { ...data, size: Math.max((data.size || 0.5) * 2.5, 2), zIndex: 8 };
        }
        return { ...data, hidden: true };
      }
      const sImp = graph.getNodeAttribute(s, 'isImportant');
      const tImp = graph.getNodeAttribute(t, 'isImportant');
      if (!sImp || !tImp) return { ...data, hidden: true };
      if (data.direction !== 'mutual' && data.weight <= 1) {
        return { ...data, color: '#1f2937', size: 0.3 };
      }
      return data;
    },
  });

  // GEXF는 이미 좌표가 있어 레이아웃 계산 불필요
  if (usedGexf) {
    document.getElementById('loading').style.display = 'none';
  } else {
    document.getElementById('loading').querySelector('div:last-child').textContent =
      '레이아웃 계산 중... (5~10초)';
    setTimeout(() => {
      runLayout();
      document.getElementById('loading').style.display = 'none';
    }, 50);
  }

  // 클릭 → 부분 그래프 모드 진입
  sigmaInstance.on('clickNode', ({ node }) => {
    const attrs = graph.getNodeAttributes(node);
    showInfo(node, attrs);
    enterFocus(node, 1);
  });

  // 빈 곳 클릭 시는 정보 패널만 닫음 (그래프는 유지)
  sigmaInstance.on('clickStage', () => {
    document.getElementById('info').style.display = 'none';
  });

  // Hover — 라벨 강제 표시 + 커서 포인터
  let hovered = null;
  sigmaInstance.on('enterNode', ({ node }) => {
    hovered = node;
    document.body.style.cursor = 'pointer';
    // 해당 노드와 이웃 라벨 강조
    sigmaInstance.refresh();
  });
  sigmaInstance.on('leaveNode', () => {
    hovered = null;
    document.body.style.cursor = 'default';
    sigmaInstance.refresh();
  });
  // reducer에서 hovered 참조용
  window.__getHovered = () => hovered;

  // 줌인할수록 더 많은 노드·라벨 점진 표시
  let lastRatio = 1;
  sigmaInstance.getCamera().on('updated', () => {
    const ratio = sigmaInstance.getCamera().ratio;
    if (Math.abs(ratio - lastRatio) < 0.05) return;
    lastRatio = ratio;
    // ratio가 작을수록 줌인 → 더 많이 표시
    const showAll = ratio < 0.3;
    const labelMore = ratio < 0.6;
    if (focusMode) return;
    graph.forEachNode((n, attrs) => {
      const newImp = showAll ? true : attrs.isImportant;
      const newLab = labelMore ? attrs.isImportant : attrs.isLabeled;
      graph.setNodeAttribute(n, 'isImportant', newImp);
      graph.setNodeAttribute(n, 'isLabeled', newLab);
    });
    sigmaInstance.refresh();
  });
}

function runLayout() {
  // graphology-library에 포함된 ForceAtlas2 정적 레이아웃 사용
  const fa2 = graphologyLibrary.layoutForceAtlas2;
  if (!fa2 || typeof fa2.assign !== 'function') {
    console.warn('layoutForceAtlas2를 찾을 수 없습니다. 랜덤 위치 유지.');
    return;
  }

  // 1700+ 노드 → 적당한 반복 횟수
  const settings = fa2.inferSettings ? fa2.inferSettings(graph) : {};
  fa2.assign(graph, {
    iterations: 200,
    settings: {
      ...settings,
      gravity: 1,
      scalingRatio: 8,
      strongGravityMode: false,
      barnesHutOptimize: true,
      slowDown: 5,
    }
  });

  if (sigmaInstance) sigmaInstance.refresh();
}

// N단계 이웃까지 BFS로 수집
function neighborsWithin(centerNode, depth) {
  const result = new Set([centerNode]);
  let frontier = new Set([centerNode]);
  for (let d = 0; d < depth; d++) {
    const next = new Set();
    frontier.forEach(n => {
      graph.neighbors(n).forEach(nb => {
        if (!result.has(nb)) { result.add(nb); next.add(nb); }
      });
    });
    frontier = next;
    if (frontier.size === 0) break;
  }
  return result;
}

// 부분 그래프 모드 진입
function enterFocus(node, depth) {
  focusMode = true;
  focusCenter = node;
  focusDepth = depth;
  visibleNodes = neighborsWithin(node, depth);

  const label = graph.getNodeAttribute(node, 'label');
  document.getElementById('focus-label').textContent = `🎯 ${label}`;
  document.getElementById('focus-stats').textContent =
    `${depth}단계 이웃 · ${visibleNodes.size}개 노드`;
  document.getElementById('focus-bar').classList.add('active');

  // 색상 초기화 (강조 모드 잔재 제거)
  resetColors();
  sigmaInstance.refresh();

  // 카메라를 중심 노드로 부드럽게 이동
  const centerAttrs = graph.getNodeAttributes(node);
  sigmaInstance.getCamera().animate(
    { x: centerAttrs.x, y: centerAttrs.y, ratio: 0.4 },
    { duration: 600 }
  );
}

// 부분 그래프 모드 해제
function exitFocus() {
  focusMode = false;
  focusCenter = null;
  visibleNodes.clear();
  document.getElementById('focus-bar').classList.remove('active');
  resetColors();
  sigmaInstance.refresh();
  sigmaInstance.getCamera().animatedReset();
}

function expandFocus() {
  if (!focusMode || !focusCenter) return;
  if (focusDepth >= 5) return;
  enterFocus(focusCenter, focusDepth + 1);
}

function shrinkFocus() {
  if (!focusMode || !focusCenter) return;
  if (focusDepth <= 1) { exitFocus(); return; }
  enterFocus(focusCenter, focusDepth - 1);
}

function resetColors() {
  graph.forEachNode((n, attrs) => {
    graph.setNodeAttribute(n, 'color', attrs.origColor);
  });
  graph.forEachEdge((e, attrs) => {
    graph.setEdgeAttribute(e, 'color', attrs.origColor || '#30363d');
  });
}

function showInfo(nodeId, attrs) {
  const panel = document.getElementById('info');
  const slug = nodeId;
  const url  = '/' + slug;

  // 엣지 통계 계산
  let mutual = 0, oneway = 0, oppositeRel = 0;
  const relCounts = {};
  graph.forEachEdge(nodeId, (e, eAttrs, src, tgt) => {
    if (eAttrs.direction === 'mutual') mutual++; else oneway++;
    if (eAttrs.relType && eAttrs.relType.includes('친일인물') && eAttrs.relType.includes('항일인물')) {
      oppositeRel++;
    }
    relCounts[eAttrs.relType] = (relCounts[eAttrs.relType] || 0) + 1;
  });

  const topRels = Object.entries(relCounts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 3)
    .map(([k, v]) => `${k} (${v})`)
    .join(', ');

  panel.style.display = 'block';
  panel.innerHTML = `
    <h3>${attrs.label}</h3>
    <div style="color:#8b949e;margin-bottom:6px;">
      총 연결: <b style="color:#e6edf3">${graph.degree(nodeId)}</b>개
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px;font-size:11px;">
      <span style="color:#FFD700">🟡 양방향 ${mutual}</span>
      <span style="color:#8b949e">⬜ 단방향 ${oneway}</span>
      ${oppositeRel ? `<span style="color:#FF4444">⚔ 대립 ${oppositeRel}</span>` : ''}
    </div>
    ${topRels ? `<div style="font-size:10px;color:#8b949e;margin-bottom:8px;">주요 관계: ${topRels}</div>` : ''}
    ${attrs.tags.length ? `<div style="margin-bottom:8px;">${attrs.tags.slice(0,5).map(t => `<span style="background:#21262d;padding:2px 6px;border-radius:4px;font-size:10px;margin-right:4px;">${t}</span>`).join('')}</div>` : ''}
    <a href="${url}" target="_blank">→ 노트 열기</a>
  `;
}

// 검색 — 엔터 또는 정확 매칭 1개면 부분 그래프 모드로 진입
let searchTimer = null;
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase().trim();
  clearTimeout(searchTimer);

  if (!q) {
    if (focusMode) exitFocus();
    return;
  }

  // 디바운스: 입력 멈춘 후 350ms 뒤에 적용
  searchTimer = setTimeout(() => {
    const matched = [];
    graph.forEachNode((n, attrs) => {
      if (attrs.label.toLowerCase().includes(q)) matched.push(n);
    });

    if (matched.length === 0) return;

    if (matched.length === 1) {
      // 정확히 1개 → 부분 그래프 모드
      const node = matched[0];
      enterFocus(node, 1);
      showInfo(node, graph.getNodeAttributes(node));
    } else if (matched.length <= 5) {
      // 2~5개 → 모두 표시 + 각자의 이웃까지
      const all = new Set();
      matched.forEach(n => neighborsWithin(n, 1).forEach(x => all.add(x)));
      focusMode = true;
      focusCenter = matched[0];
      focusDepth = 1;
      visibleNodes = all;
      document.getElementById('focus-label').textContent = `🔍 "${q}" 매칭 ${matched.length}개`;
      document.getElementById('focus-stats').textContent = `이웃 포함 ${all.size}개 노드`;
      document.getElementById('focus-bar').classList.add('active');
      sigmaInstance.refresh();
    } else {
      // 6개 이상 → 매칭만 강조 (전체 그래프 유지)
      if (focusMode) exitFocus();
      const set = new Set(matched);
      graph.forEachNode((n, attrs) => {
        graph.setNodeAttribute(n, 'color', set.has(n) ? attrs.origColor : '#1c2128');
      });
    }
  }, 350);
});

// 범례 필터 — 카테고리 부분 그래프 모드
document.querySelectorAll('.legend-item').forEach(el => {
  el.addEventListener('click', () => {
    const f = el.dataset.filter;
    if (f === 'all') { exitFocus(); activeFilter = null; return; }

    activeFilter = f;
    const colorMatch = COLOR_MAP[f];
    const matched = new Set();
    graph.forEachNode((n, attrs) => {
      const match = attrs.origColor === colorMatch ||
                    (attrs.tags || []).some(t => t.includes(f));
      if (match) matched.add(n);
    });

    if (matched.size === 0) return;

    focusMode = true;
    focusCenter = null;
    visibleNodes = matched;
    document.getElementById('focus-label').textContent = `🏷️ ${f}`;
    document.getElementById('focus-stats').textContent = `${matched.size}개 노드`;
    document.getElementById('focus-bar').classList.add('active');
    resetColors();
    sigmaInstance.refresh();
  });
});

// 부분 그래프 모드 컨트롤
document.getElementById('btn-expand').addEventListener('click', expandFocus);
document.getElementById('btn-shrink').addEventListener('click', shrinkFocus);
document.getElementById('btn-exit-focus').addEventListener('click', exitFocus);

// 리셋 버튼
document.getElementById('btn-reset').addEventListener('click', () => {
  exitFocus();
  document.getElementById('info').style.display = 'none';
  document.getElementById('search').value = '';
});

// 레이아웃 재계산
document.getElementById('btn-layout').addEventListener('click', runLayout);

init().catch(err => {
  document.getElementById('loading').innerHTML =
    `<div style="color:#f85149">그래프 로딩 실패: ${err.message}</div>`;
});
</script>
</body>
</html>
