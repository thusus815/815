name: Validate Inbox Submissions

on:
  push:
    branches: [main]
    paths:
      - '_inbox/대기/**.md'
  pull_request:
    paths:
      - '_inbox/대기/**.md'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run validation
        id: validate
        run: |
          python scripts/validate_inbox.py
        continue-on-error: true

      - name: Show validation summary
        if: always()
        run: |
          if [ -f _inbox/_검증결과.json ]; then
            echo "## 검증 요약" >> $GITHUB_STEP_SUMMARY
            python -c "
          import json
          d = json.load(open('_inbox/_검증결과.json', encoding='utf-8'))
          print(f\"- 통과: **{d['pass']}**\")
          print(f\"- 거부: **{d['fail']}**\")
          print()
          for it in d['items']:
              ico = '✅' if it['status']=='통과' else '❌'
              print(f\"### {ico} {it['file']}\")
              print(f\"- 제출자: {it['submitted_by']}\")
              if it['reasons']:
                  print('- 사유:')
                  for r in it['reasons']:
                      print(f'  - {r}')
              print()
          " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit moved files (push only, not PR)
        if: github.event_name == 'push' && success()
        run: |
          if [ -n "$(git status --porcelain _inbox/)" ]; then
            git config user.name "validator-bot"
            git config user.email "validator@thusus815.local"
            git add _inbox/
            git commit -m "Auto-validate inbox submissions [skip ci]" || true
            git push origin main
          fi
