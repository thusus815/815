name: Deploy 815 Archive

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vault
        uses: actions/checkout@v4
        with:
          path: vault

      - name: Checkout Quartz
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          ref: v4
          path: quartz

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quartz dependencies
        run: npm ci
        working-directory: quartz

      - name: Copy vault content to Quartz
        run: |
          rm -rf quartz/content
          cp -r vault quartz/content

      - name: Copy Quartz config
        run: |
          cp vault/quartz.config.ts quartz/quartz.config.ts
          if [ -f vault/quartz.layout.ts ]; then
            cp vault/quartz.layout.ts quartz/quartz.layout.ts
          fi
        continue-on-error: true

      - name: Build
        run: npx quartz build
        working-directory: quartz

      - name: Copy graph data and viewer to public
        run: |
          if [ -f vault/graph_data.json ]; then
            cp vault/graph_data.json quartz/public/graph_data.json
          fi
          if [ -f vault/graph.html ]; then
            cp vault/graph.html quartz/public/graph.html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
