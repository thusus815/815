name: Deploy 815 Archive

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vault
        uses: actions/checkout@v4
        with:
          path: vault

      - name: Checkout Quartz
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          ref: v4
          path: quartz

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Quartz dependencies
        run: npm ci
        working-directory: quartz

      - name: Rebuild knowledge graph (graph_data.json)
        run: |
          if [ -f vault/scripts/build_graph.py ]; then
            python vault/scripts/build_graph.py --vault vault --out vault/graph_data.json
            echo "Graph rebuilt successfully"
          else
            echo "build_graph.py not found, skipping"
          fi

      - name: Auto-layout (Louvain + ForceAtlas2 → graph.gexf)
        run: |
          if [ -f vault/scripts/layout/build_layout.mjs ]; then
            cd vault/scripts/layout
            npm ci --no-audit --no-fund
            node build_layout.mjs
            cd ../../..
            echo "Auto-layout complete"
          else
            echo "build_layout.mjs not found, skipping (graph.gexf will use existing file)"
          fi

      - name: Copy vault content to Quartz
        run: |
          rm -rf quartz/content
          cp -r vault quartz/content

      - name: Copy Quartz config
        run: |
          cp vault/quartz.config.ts quartz/quartz.config.ts
          if [ -f vault/quartz.layout.ts ]; then
            cp vault/quartz.layout.ts quartz/quartz.layout.ts
          fi
        continue-on-error: true

      - name: Build
        run: npx quartz build
        working-directory: quartz

      - name: Copy graph data and viewer to public
        run: |
          if [ -f vault/graph_data.json ]; then
            cp vault/graph_data.json quartz/public/graph_data.json
          fi
          if [ -f vault/graph.gexf ]; then
            cp vault/graph.gexf quartz/public/graph.gexf
          fi
          if [ -f vault/graph.html ]; then
            cp vault/graph.html quartz/public/graph.html
          fi
          # 랜딩 페이지 — Quartz 빌드 결과 덮어쓰기
          if [ -f vault/index.html ]; then
            cp vault/index.html quartz/public/index.html
          fi
          # 채팅 UI
          if [ -f vault/chat.html ]; then
            cp vault/chat.html quartz/public/chat.html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
