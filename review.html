<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>자료 검토 — 815 아카이브</title>
<style>
  :root {
    --bg: #f7f5f0;
    --fg: #1a1a1a;
    --muted: #6b6b6b;
    --line: #d8d3c8;
    --accent: #b73a3a;
    --ok: #2e7d32;
    --warn: #c47f00;
    --danger: #c62828;
    --info: #1565c0;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: 'Noto Sans KR', system-ui, sans-serif; }
  header { padding: 16px 24px; border-bottom: 1px solid var(--line); background: #fff; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 18px; margin: 0; }
  header .who { font-size: 13px; color: var(--muted); }
  main { max-width: 1400px; margin: 0 auto; padding: 16px; }
  .login-box { max-width: 380px; margin: 80px auto; padding: 28px; background: #fff; border: 1px solid var(--line); border-radius: 8px; }
  .login-box h2 { margin-top: 0; }
  .login-box input[type="password"] { width: 100%; padding: 10px; font-size: 15px; border: 1px solid var(--line); border-radius: 4px; }
  .login-box button { width: 100%; padding: 10px; margin-top: 12px; background: var(--accent); color: #fff; border: 0; border-radius: 4px; font-size: 15px; cursor: pointer; }
  .login-box button:hover { background: #8f2d2d; }
  .login-box .help { font-size: 12px; color: var(--muted); margin-top: 12px; line-height: 1.5; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
  .filters button { padding: 6px 12px; border: 1px solid var(--line); background: #fff; border-radius: 16px; font-size: 13px; cursor: pointer; }
  .filters button.active { background: var(--fg); color: #fff; border-color: var(--fg); }
  .filters .count { font-size: 12px; color: var(--muted); margin-left: auto; }

  table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid var(--line); }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--line); font-size: 13px; vertical-align: top; }
  th { background: #efeae0; font-weight: 600; position: sticky; top: 0; }
  tr.row { cursor: pointer; }
  tr.row:hover { background: #faf7ee; }
  tr.detail-row { display: none; background: #fdfcf6; }
  tr.detail-row.open { display: table-row; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .b-인물 { background: #e8d4d4; color: #7a1f1f; }
  .b-학교 { background: #e1d4e8; color: #5b2f7a; }
  .b-신문 { background: #d4e2e8; color: #1f4f7a; }
  .b-판결문 { background: #e8e0d4; color: #5b491f; }
  .b-사건 { background: #f5d4d4; color: #c62828; }
  .b-단체 { background: #f0e0c0; color: #6e4f1a; }
  .b-지역 { background: #e0e0e0; color: #444; }

  .status { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
  .s-pending { background: #eee; color: #666; }
  .s-ok { background: #cce8d0; color: var(--ok); }
  .s-edit_needed { background: #ffe5b3; color: var(--warn); }
  .s-reject_suggested { background: #f5cbcb; color: var(--danger); }
  .s-reroute_suggested { background: #cee0f5; color: var(--info); }

  .detail-pad { padding: 16px 24px; }
  .detail-pad h3 { margin: 8px 0 4px; font-size: 14px; }
  .detail-pad .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .detail-pad .panel { border: 1px solid var(--line); border-radius: 4px; background: #fff; }
  .detail-pad .panel h4 { margin: 0; padding: 8px 12px; background: #efeae0; font-size: 12px; border-bottom: 1px solid var(--line); }
  .detail-pad .panel .body { padding: 12px; }
  .detail-pad pre { white-space: pre-wrap; font-size: 12px; line-height: 1.5; max-height: 400px; overflow-y: auto; margin: 0; font-family: 'D2Coding', Consolas, monospace; }
  .detail-pad .actions { margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
  .detail-pad .actions button { padding: 8px 14px; border: 1px solid var(--line); background: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; }
  .btn-ok { color: var(--ok); border-color: var(--ok); }
  .btn-edit { color: var(--warn); border-color: var(--warn); }
  .btn-reject { color: var(--danger); border-color: var(--danger); }
  .btn-reroute { color: var(--info); border-color: var(--info); }
  .btn-comment { background: var(--fg); color: #fff; border-color: var(--fg); }

  .note-input { width: 100%; min-height: 60px; padding: 8px; border: 1px solid var(--line); border-radius: 4px; font-family: inherit; font-size: 13px; resize: vertical; }
  .img-thumbs { display: flex; flex-wrap: wrap; gap: 8px; }
  .img-thumbs img { max-width: 200px; max-height: 150px; border: 1px solid var(--line); }

  .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 16px; background: var(--fg); color: #fff; border-radius: 4px; opacity: 0; transition: opacity 0.3s; }
  .toast.show { opacity: 1; }

  .comments { font-size: 12px; }
  .comments .c { padding: 6px 8px; background: #f5f0e3; border-left: 3px solid var(--accent); margin-bottom: 4px; border-radius: 2px; }
  .comments .c .meta { color: var(--muted); font-size: 11px; }
</style>
</head>
<body>

<div id="login-screen" class="login-box">
  <h2>자료 검토 로그인</h2>
  <p style="font-size: 13px; color: var(--muted);">검토자 비밀번호를 입력하세요.</p>
  <input id="pw" type="password" placeholder="비밀번호" autofocus />
  <button id="login-btn">로그인</button>
  <div id="login-err" style="color: var(--danger); font-size: 12px; margin-top: 8px; min-height: 16px;"></div>
  <div class="help">
    이 화면은 자료 제출 검토용입니다. 자료를 직접 승인·커밋하지는 않으며,
    검토자의 의견(이상 없음 / 수정 필요 / 반려 추천 / 분류 재검토)만 운영자에게 전달됩니다.
  </div>
</div>

<div id="app" style="display: none;">
  <header>
    <h1>📋 자료 제출 검토</h1>
    <div class="who">
      검토자: <strong id="who-name">-</strong>
      <a href="#" id="logout" style="margin-left: 12px; color: var(--muted);">로그아웃</a>
    </div>
  </header>
  <main>
    <div class="filters">
      <button data-filter="all" class="active">전체 <span data-count="all">-</span></button>
      <button data-filter="pending">미검토 <span data-count="pending">-</span></button>
      <button data-filter="ok">검토완료 <span data-count="ok">-</span></button>
      <button data-filter="edit_needed">수정필요 <span data-count="edit_needed">-</span></button>
      <button data-filter="reject_suggested">반려추천 <span data-count="reject_suggested">-</span></button>
      <button data-filter="reroute_suggested">분류재검토 <span data-count="reroute_suggested">-</span></button>
      <span class="count" id="visible-count"></span>
      <button id="refresh" style="margin-left: 8px;">↻ 새로고침</button>
    </div>

    <table>
      <thead>
        <tr>
          <th style="width: 60px;">#</th>
          <th style="width: 60px;">분류</th>
          <th>제목</th>
          <th style="width: 220px;">자동 폴더</th>
          <th style="width: 200px;">자동 파일명</th>
          <th style="width: 110px;">검토상태</th>
          <th style="width: 90px;">제출일</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER_URL = 'https://815-chat.sungandpartners.workers.dev';
let TOKEN = localStorage.getItem('review_token') || '';
let DATA = [];
let FILTER = 'all';

// ─── 로그인 ─────────────────────────────────────────
document.getElementById('login-btn').addEventListener('click', tryLogin);
document.getElementById('pw').addEventListener('keydown', (e) => { if (e.key === 'Enter') tryLogin(); });

async function tryLogin() {
  const pw = document.getElementById('pw').value;
  document.getElementById('login-err').textContent = '';
  try {
    const res = await fetch(`${WORKER_URL}/review/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    const data = await res.json();
    if (!res.ok) {
      document.getElementById('login-err').textContent = data.error || '로그인 실패';
      return;
    }
    TOKEN = data.token;
    localStorage.setItem('review_token', TOKEN);
    localStorage.setItem('review_name', data.reviewer_name);
    enterApp(data.reviewer_name);
  } catch (e) {
    document.getElementById('login-err').textContent = '네트워크 오류: ' + e.message;
  }
}

document.getElementById('logout').addEventListener('click', (e) => {
  e.preventDefault();
  localStorage.removeItem('review_token');
  localStorage.removeItem('review_name');
  TOKEN = '';
  location.reload();
});

function enterApp(name) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('who-name').textContent = name;
  loadIssues();
}

if (TOKEN) {
  enterApp(localStorage.getItem('review_name') || '검토자');
}

// ─── 데이터 로딩 ────────────────────────────────────
async function loadIssues() {
  const res = await fetch(`${WORKER_URL}/review/issues`, {
    headers: { 'Authorization': `Bearer ${TOKEN}` },
  });
  if (res.status === 401) {
    localStorage.removeItem('review_token');
    location.reload();
    return;
  }
  const data = await res.json();
  DATA = data.issues || [];
  renderTable();
}

document.getElementById('refresh').addEventListener('click', loadIssues);

document.querySelectorAll('.filters button[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filters button[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    FILTER = btn.dataset.filter;
    renderTable();
  });
});

// ─── 테이블 렌더 ────────────────────────────────────
function renderTable() {
  const tb = document.getElementById('tbody');
  tb.innerHTML = '';

  const counts = { all: DATA.length, pending: 0, ok: 0, edit_needed: 0, reject_suggested: 0, reroute_suggested: 0 };
  for (const iss of DATA) {
    counts[iss.review.status] = (counts[iss.review.status] || 0) + 1;
  }
  for (const k of Object.keys(counts)) {
    const el = document.querySelector(`[data-count="${k}"]`);
    if (el) el.textContent = counts[k];
  }

  const visible = FILTER === 'all' ? DATA : DATA.filter(i => i.review.status === FILTER);
  document.getElementById('visible-count').textContent = `${visible.length} / ${DATA.length} 건 표시`;

  for (const iss of visible) {
    const kind = iss.preview ? iss.preview.kind : '-';
    const folder = iss.preview ? iss.preview.folder : '-';
    const filename = iss.preview ? iss.preview.filename : '-';
    const date = iss.created_at ? iss.created_at.slice(0, 10) : '-';
    const statusName = {
      pending: '미검토', ok: '검토완료', edit_needed: '수정필요',
      reject_suggested: '반려추천', reroute_suggested: '분류재검토',
    }[iss.review.status] || iss.review.status;

    // 메인 행
    const tr = document.createElement('tr');
    tr.className = 'row';
    tr.innerHTML = `
      <td>#${iss.number}</td>
      <td><span class="badge b-${kind}">${kind}</span></td>
      <td>${escapeHtml(iss.title.replace('[자료 제출] ', ''))}</td>
      <td><code style="font-size: 11px;">${folder}</code></td>
      <td><code style="font-size: 11px;">${filename}</code></td>
      <td><span class="status s-${iss.review.status}">${statusName}</span></td>
      <td>${date}</td>
    `;
    tb.appendChild(tr);

    // 상세 행 (펼치기)
    const detail = document.createElement('tr');
    detail.className = 'detail-row';
    detail.innerHTML = `<td colspan="7"><div class="detail-pad">
      <div class="grid">
        <div class="panel">
          <h4>📄 자동 분류 미리보기 (.md)</h4>
          <div class="body"><pre>${escapeHtml(iss.preview ? iss.preview.md : '(자동 분류 실패 — body 없음)')}</pre></div>
        </div>
        <div class="panel">
          <h4>📥 원본 이슈 본문</h4>
          <div class="body"><pre>${escapeHtml(iss.body || '')}</pre></div>
        </div>
      </div>
      <div class="panel" style="margin-top: 12px;">
        <h4>🖼 첨부 이미지</h4>
        <div class="body img-thumbs">${renderImageThumbs(iss.body)}</div>
      </div>
      ${iss.review.comments && iss.review.comments.length ? `
      <div class="panel" style="margin-top: 12px;">
        <h4>💬 검토 의견 (${iss.review.comments.length})</h4>
        <div class="body comments">${iss.review.comments.map(c => `<div class="c"><div class="meta">${c.reviewer} · ${new Date(c.ts).toLocaleString()}</div>${escapeHtml(c.text)}</div>`).join('')}</div>
      </div>` : ''}
      <h3 style="margin-top: 16px;">검토 의견 남기기</h3>
      <textarea class="note-input" data-num="${iss.number}" placeholder="이 자료에 대한 의견·수정사항·메모. (선택)"></textarea>
      <div class="actions">
        <button class="btn-ok" data-action="ok" data-num="${iss.number}">✅ 이상 없음</button>
        <button class="btn-edit" data-action="edit_needed" data-num="${iss.number}">✏️ 수정 필요</button>
        <button class="btn-reroute" data-action="reroute_suggested" data-num="${iss.number}">🗂 분류 재검토</button>
        <button class="btn-reject" data-action="reject_suggested" data-num="${iss.number}">❌ 반려 추천</button>
        <button class="btn-comment" data-action="comment" data-num="${iss.number}">💬 의견만 남기기</button>
        <a href="${iss.html_url}" target="_blank" style="margin-left: auto; align-self: center; font-size: 12px; color: var(--muted);">GitHub 이슈 열기 ↗</a>
      </div>
    </div></td>`;
    tb.appendChild(detail);

    // 클릭 핸들러
    tr.addEventListener('click', () => detail.classList.toggle('open'));
  }

  // 액션 버튼들
  tb.querySelectorAll('button[data-action]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const num = +btn.dataset.num;
      const action = btn.dataset.action;
      const note = tb.querySelector(`textarea[data-num="${num}"]`).value.trim();

      if (action === 'comment') {
        if (!note) { toast('의견을 입력하세요'); return; }
        const r = await fetch(`${WORKER_URL}/review/comment`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
          body: JSON.stringify({ issue_number: num, text: note }),
        });
        const d = await r.json();
        if (!r.ok) { toast('실패: ' + d.error); return; }
        toast('의견 등록 완료');
      } else {
        const r = await fetch(`${WORKER_URL}/review/flag`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
          body: JSON.stringify({ issue_number: num, status: action, note }),
        });
        const d = await r.json();
        if (!r.ok) { toast('실패: ' + d.error); return; }
        toast({
          ok: '✅ 검토완료 표시',
          edit_needed: '✏️ 수정필요 표시',
          reject_suggested: '❌ 반려추천 표시',
          reroute_suggested: '🗂 분류재검토 표시',
        }[action] || '저장됨');
      }
      // 갱신
      await loadIssues();
    });
  });
}

function renderImageThumbs(body) {
  if (!body) return '(없음)';
  const re = /https:\/\/pub-[a-z0-9]+\.r2\.dev\/[^\s\)\]"<>]+/g;
  const urls = body.match(re) || [];
  if (urls.length === 0) return '(없음)';
  return urls.map(u => `<a href="${u}" target="_blank"><img src="${u}" alt="" loading="lazy" /></a>`).join('');
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
