name = "815-chat"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Workers AI 바인딩 (무료 한도 있음)
[ai]
binding = "AI"

# 자료 제출 인증 (이슈번호:비밀번호해시 저장)
[[kv_namespaces]]
binding = "SUBMIT_AUTH"
id = "aed9da2e0ee54da58651dd3d1305b217"

# 검토자(김남균 선생 등) 세션·검토상태 저장
[[kv_namespaces]]
binding = "REVIEW_STATE"
id = "feefc4c39785401482fe51fdcda81b3a"

# 첨부파일 저장 R2 버킷
[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "archive-attachments"

[vars]
SITE_ORIGIN = "https://thusus815.github.io"
GRAPH_DATA_URL = "https://thusus815.github.io/815/graph_data.json"
RELATIONS_URL = "https://thusus815.github.io/815/graph_relations.json"

# 배포: cd worker && npx wrangler deploy
# 개발: cd worker && npx wrangler dev
